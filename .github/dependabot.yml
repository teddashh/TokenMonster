version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    target-branch: main
    open-pull-requests-limit: 1
    versioning-strategy: increase
    allow:
      - dependency-name: tokentracker-cli
        dependency-type: direct
    commit-message:
      prefix: "deps(sidecar)"
    # Dependabot opens a normal reviewable PR. No auto-merge workflow is used.
