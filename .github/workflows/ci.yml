name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sidecar-compatibility:
    name: Sidecar compatibility (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.15.0
          cache: npm

      - name: Pin npm
        run: npm install --global npm@11.12.1

      - name: Install exact dependencies
        run: npm ci

      # Build dependency-first so workspace package exports exist in a fresh checkout.
      - name: Build sidecar path
        run: |
          npm run build --workspace @tokenmonster/monster-engine
          npm run build --workspace @tokenmonster/characters
          npm run build --workspace @tokenmonster/token-tracker-adapter
          npm run build --workspace @tokenmonster/token-tracker-runtime
          npm run build --workspace @tokenmonster/companion-gateway
          npm run build --workspace @tokenmonster/companion-ui
          npm run build --workspace tokenmonster

      - name: Type-check sidecar path
        run: |
          npm run typecheck --workspace @tokenmonster/monster-engine
          npm run typecheck --workspace @tokenmonster/characters
          npm run typecheck --workspace @tokenmonster/token-tracker-adapter
          npm run typecheck --workspace @tokenmonster/token-tracker-runtime
          npm run typecheck --workspace @tokenmonster/companion-gateway
          npm run typecheck --workspace @tokenmonster/companion-ui
          npm run typecheck --workspace tokenmonster

      - name: Test sidecar path without collection
        run: |
          npm test --workspace @tokenmonster/monster-engine
          npm test --workspace @tokenmonster/characters
          npm test --workspace @tokenmonster/token-tracker-adapter
          npm test --workspace @tokenmonster/token-tracker-runtime
          npm test --workspace @tokenmonster/companion-gateway
          npm test --workspace @tokenmonster/companion-ui
          npm test --workspace tokenmonster

      - name: Smoke-test CLI metadata
        run: node packages/cli/dist/bin.js --version

  companion-desktop:
    name: Companion desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.15.0
          cache: npm

      - name: Install exact dependencies
        shell: bash
        run: npm ci

      - name: Build desktop dependency closure
        shell: bash
        run: node scripts/run-workspaces.mjs build @tokenmonster/companion

      - name: Test desktop app
        shell: bash
        run: npm test --workspace @tokenmonster/companion

  # Expensive installer builds run only for tags, manual dispatch, or push
  # commits marked [package].
  companion-installers:
    name: Companion installers [package] (${{ matrix.os }})
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[package]')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.15.0
          cache: npm

      - name: Install exact dependencies
        shell: bash
        run: npm ci

      - name: Build desktop dependency closure
        shell: bash
        run: node scripts/run-workspaces.mjs build @tokenmonster/companion

      - name: Make unsigned desktop installers
        shell: bash
        run: node scripts/package-companion.mjs make internal

      - name: Upload desktop installers
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tokenmonster-desktop-${{ matrix.os }}
          path: apps/companion/out/make/
          if-no-files-found: error
          retention-days: 7

      - name: Attach desktop installers to GitHub Release
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # macOS runners ship bash 3.2, which lacks mapfile.
          files=()
          while IFS= read -r -d '' file; do
            files+=("$file")
          done < <(find apps/companion/out/make -type f -print0)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No desktop installer artifacts found" >&2
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" --clobber -- "${files[@]}"

  verify:
    name: Verify (Node 24)
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.15.0
          cache: npm

      - name: Pin npm
        run: |
          npm install --global npm@11.12.1
          test "$(node --version)" = "v24.15.0"
          test "$(npm --version)" = "11.12.1"

      - name: Install denied-egress smoke-test tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends bubblewrap strace
          bwrap --version
          strace --version

      # Ubuntu 24.04 restricts unprivileged user namespaces with AppArmor by default:
      # https://ubuntu.com/blog/ubuntu-23-10-restricted-unprivileged-user-namespaces
      # Bubblewrap needs them to enforce the real denied-egress smoke test.
      - name: Enable bubblewrap user namespaces
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          test "$(sysctl -n kernel.apparmor_restrict_unprivileged_userns)" = "0"

      - name: Install exact dependencies
        run: npm ci

      - name: Verify repository policy and formatting
        run: |
          npm run lint
          npm run format:check
          npm run verify:secrets

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dependency tree and release artifacts
        run: |
          npm ls --depth=0
          npm run verify:packaging-toolchain
          npm run verify:artifacts

      - name: Package and inspect unsigned companion
        run: npm run make:companion:internal

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Generate release evidence
        run: |
          mkdir -p release-evidence
          # Release evidence covers shipped (production) dependencies; dev-only
          # toolchains (electron-forge) carry override pins npm flags as invalid.
          npm sbom --sbom-format cyclonedx --omit dev > release-evidence/sbom.cdx.json
          npm pack --dry-run --json --workspaces > release-evidence/npm-pack-inventory.json
          LC_ALL=C find apps/web/dist apps/api/dist apps/companion/out/make packages/*/dist \
            -type f -print0 | sort -z | xargs -0 sha256sum \
            > release-evidence/SHA256SUMS
          sha256sum package-lock.json >> release-evidence/SHA256SUMS

      - name: Upload immutable release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tokenmonster-release-evidence-${{ github.sha }}
          path: |
            release-evidence/
            apps/web/dist/
            apps/companion/out/make/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30

  release-smoke:
    name: Release smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.15.0
          cache: npm

      - name: Install exact dependencies
        shell: bash
        run: npm ci

      - name: Build release artifact
        shell: bash
        run: node scripts/release/build-release.mjs --version-suffix "ci.${{ github.run_id }}"

      - name: Reject binary assets in release tarball
        shell: bash
        run: |
          tarballs=(dist-release/tokenmonster-*.tgz)
          if [[ "${#tarballs[@]}" -ne 1 || ! -f "${tarballs[0]}" ]]; then
            echo "Expected exactly one release tarball" >&2
            exit 1
          fi
          archive_entries="${{ runner.temp }}/tokenmonster-release-entries.txt"
          tar -tzf "${tarballs[0]}" > "$archive_entries"
          if forbidden_entries="$(grep -E '\.(webp|png|jpg|jpeg|gif|wav|mp3|node)$' "$archive_entries")"; then
            echo "Release tarball contains forbidden binary assets:" >&2
            echo "$forbidden_entries" >&2
            exit 1
          fi

      - name: Install release tarball locally
        shell: bash
        run: |
          tarballs=(dist-release/tokenmonster-*.tgz)
          if [[ "${#tarballs[@]}" -ne 1 || ! -f "${tarballs[0]}" ]]; then
            echo "Expected exactly one release tarball" >&2
            exit 1
          fi
          tarball="$(cd "$(dirname "${tarballs[0]}")" && pwd)/$(basename "${tarballs[0]}")"
          install_dir="${{ runner.temp }}/tokenmonster-install"
          mkdir -p "$install_dir"
          cd "$install_dir"
          npm install "$tarball"

      - name: Smoke-test installed release
        shell: bash
        run: node scripts/release/smoke-installed.mjs "${{ runner.temp }}/tokenmonster-install"

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tokenmonster-release-${{ matrix.os }}
          path: |
            dist-release/*.tgz
            dist-release/SHASUMS256.txt
          retention-days: 7
