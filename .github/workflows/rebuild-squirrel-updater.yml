name: Rebuild reviewed Squirrel updater

on:
  workflow_call:
    inputs:
      derive_candidate:
        description: Derive quarantined candidate receipts without accepting them
        type: boolean
        required: false
        default: false
  workflow_dispatch:
    inputs:
      derive_candidate:
        description: Derive quarantined candidate receipts without accepting them
        type: boolean
        required: true
        default: false

permissions:
  contents: read

jobs:
  rebuild-reviewed-updater:
    name: Rebuild reviewed Squirrel updater twice
    runs-on: windows-2022
    timeout-minutes: 25

    steps:
      - name: Check out exact TokenMonster patch policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.workflow_sha }}
          path: tokenmonster-policy
          persist-credentials: false

      - name: Check out exact Microsoft.Web.Xdt source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: dotnet/xdt
          ref: 5b67dee04d86740575f0f5022b79833213cc024a
          path: xdt-source
          persist-credentials: false

      - name: Check out exact upstream source A
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Squirrel/Squirrel.Windows
          ref: eef37460aef77b2f9de8cd2237c1e55b344a6554
          path: squirrel-a
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Check out exact upstream source B
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Squirrel/Squirrel.Windows
          ref: eef37460aef77b2f9de8cd2237c1e55b344a6554
          path: squirrel-b
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Check out exact deterministic ILRepack source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: gluck/il-repack
          ref: 5b55fa2f4d7c7b18ffb104e2fade2f794f4ccedf
          path: ilrepack-source
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact upstream identities and reviewed build-tool source
        shell: pwsh
        env:
          TOKENMONSTER_POLICY_SHA: ${{ github.workflow_sha }}
          SOURCE_TAG_OBJECT: 274f7a9a5dc211552f27d1da7dc7899546a52be3
          SOURCE_BASE_COMMIT: eef37460aef77b2f9de8cd2237c1e55b344a6554
          SOURCE_BASE_DETECTOR_BLOB: 0fdefda329abf979a2c739f02761e3d4ec8e30de
          FIX_COMMIT: c98244936f6876b080366417301268058028a53c
          FIX_TREE: 0a1ebfa90cea6f8037907134d53562a26c6bb4c3
          FIX_DETECTOR_BLOB: e8e442e0d95c5b7f5cc31a2eb84cf9407f5be2ab
          UPSTREAM_MERGE_COMMIT: 45834cbfeae84d20ef2bed24ac863f02d0abec66
          NUGET_SUBMODULE_COMMIT: 50f8d9e438fe948d7109501bd10f6024d0585b70
          RETRY_PATCH_SHA256: 81a6bb631b7459773fbad1b4fbe7a878c698ab9e6016899a3f422b3fa32e2b1a
          RETRY_PATCH_BYTES: 4545
          XDT_OUTER_PATCH_SHA256: a781b27842680ae01b70b7308ea5a5154e3897e94c7c645a9cd172385fcc0137
          XDT_OUTER_PATCH_BYTES: 640
          XDT_INNER_PATCH_SHA256: 31a098f17a1409f03ff270bc819b7cebf8bcf94ca872f1484aa2699d6e5a4dce
          XDT_INNER_PATCH_BYTES: 665
          SOURCE_TEST_RUNNER_SHA256: e427140dfe867dd1739f6b493864887c53b864218aac172a4af54a11841c3a54
          SOURCE_TEST_RUNNER_BYTES: 5519
          PATCHED_SQUIRREL_PROJECT_BLOB: fcc79959834f1d0cb4d33f7a834e0a6926ccfd0f
          PATCHED_UTILITY_BLOB: 432a76a6c55c6a01c88eee2641abb3ad051d3fc8
          PATCHED_DETECTOR_TEST_BLOB: b9757252508228f50abb4aec0739905c52570bc2
          PATCHED_UTILITY_TEST_BLOB: fb4c75a7910515bb4e98f38d09d1603a329b1e0e
          PATCHED_NUGET_CORE_PROJECT_BLOB: a00ea88e7de4b53cf02ef5611de6e05ded2d7554
          PATCHED_NUGET_CORE_PACKAGES_BLOB: 7b537c87913ae0f241c71e7d34889df098181d9d
          XDT_SOURCE_COMMIT: 5b67dee04d86740575f0f5022b79833213cc024a
          XDT_SOURCE_TREE: e7f17c790d0ede422e683f8617173df0ac63f1f1
          XDT_LICENSE_BLOB: f49a4e16e68b128803cc2dcea614603632b04eac
          XDT_LICENSE_SHA256: 43070e2d4e532684de521b885f385d0841030efa2b1a20bafb76133a5e1379c1
          XDT_LICENSE_BYTES: 11356
          ILREPACK_SOURCE_COMMIT: 5b55fa2f4d7c7b18ffb104e2fade2f794f4ccedf
          ILREPACK_SOURCE_TREE: 4c7e73b48c55a535790f9d3f56687258efc525d0
          ILREPACK_RELEASE_TAG_COMMIT: 92843eace06c4eff3d6296a6fc4470ba725c57aa
          ILREPACK_IMPORTER_BLOB: 07ea3c6054587b2dca44121ca99762b950b103c2
          ILREPACK_LICENSE_BLOB: d645695673349e3947e8e5ae42332d0ac3164cd7
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $policy = Join-Path $env:GITHUB_WORKSPACE "tokenmonster-policy"
          $policyHead = (git -C $policy rev-parse HEAD).Trim()
          $policyDirty = @(git -C $policy status --porcelain)
          $policyCredentials = @(
            git -C $policy config --local --get-regexp "^http\..*\.extraheader$" 2>$null
          )
          $policyCredentialQueryExit = $LASTEXITCODE
          if ($policyCredentialQueryExit -notin @(0, 1)) {
            throw "The patch-policy credential-state query failed."
          }
          $global:LASTEXITCODE = 0
          if (
            $policyHead -cne $env:TOKENMONSTER_POLICY_SHA -or
            $policyDirty.Count -ne 0 -or
            $policyCredentials.Count -ne 0
          ) {
            throw "The patch policy is not the exact clean workflow commit."
          }

          $patchDirectory = Join-Path $policy ".github/patches/squirrel-updater"
          $retryPatch = Join-Path $patchDirectory "retry-delete-tree.patch"
          $xdtOuterPatch = Join-Path $patchDirectory "xdt-3.1.0-squirrel.patch"
          $xdtInnerPatch = Join-Path $patchDirectory "xdt-3.1.0-nuget-core.patch"
          foreach ($patchContract in @(
            @($retryPatch, $env:RETRY_PATCH_SHA256, [int64]$env:RETRY_PATCH_BYTES),
            @($xdtOuterPatch, $env:XDT_OUTER_PATCH_SHA256, [int64]$env:XDT_OUTER_PATCH_BYTES),
            @($xdtInnerPatch, $env:XDT_INNER_PATCH_SHA256, [int64]$env:XDT_INNER_PATCH_BYTES)
          )) {
            $patchFile = Get-Item -LiteralPath $patchContract[0] -Force
            $patchSha256 = (
              Get-FileHash -LiteralPath $patchFile.FullName -Algorithm SHA256
            ).Hash.ToLowerInvariant()
            if (
              -not $patchFile.PSIsContainer -and
              $patchFile.Length -eq $patchContract[2] -and
              $patchSha256 -ceq $patchContract[1]
            ) {
              continue
            }
            throw "A reviewed Squirrel source patch does not match its exact contract."
          }

          $sourceTestRunner = Join-Path $policy ".github/scripts/run-squirrel-source-tests.ps1"
          $sourceTestRunnerFile = Get-Item -LiteralPath $sourceTestRunner -Force
          $sourceTestRunnerSha256 = (
            Get-FileHash -LiteralPath $sourceTestRunnerFile.FullName -Algorithm SHA256
          ).Hash.ToLowerInvariant()
          if (
            $sourceTestRunnerFile.PSIsContainer -or
            ($sourceTestRunnerFile.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0 -or
            $sourceTestRunnerFile.Length -ne [int64]$env:SOURCE_TEST_RUNNER_BYTES -or
            $sourceTestRunnerSha256 -cne $env:SOURCE_TEST_RUNNER_SHA256
          ) {
            throw "The reviewed Squirrel source-test runner does not match its exact contract."
          }

          $xdtSource = Join-Path $env:GITHUB_WORKSPACE "xdt-source"
          $xdtHead = (git -C $xdtSource rev-parse HEAD).Trim()
          $xdtTree = (git -C $xdtSource rev-parse "HEAD^{tree}").Trim()
          $xdtLicenseBlob = (git -C $xdtSource rev-parse "HEAD:LICENSE.txt").Trim()
          $xdtLicense = Get-Item -LiteralPath (Join-Path $xdtSource "LICENSE.txt") -Force
          $xdtCanonicalLicenseText = [IO.File]::ReadAllText($xdtLicense.FullName)
          $xdtCanonicalLicenseText = $xdtCanonicalLicenseText.Replace("`r`n", "`n")
          $xdtCanonicalLicenseText = $xdtCanonicalLicenseText.Replace("`r", "`n")
          $xdtCanonicalLicenseBytes = [Text.UTF8Encoding]::new($false).GetBytes(
            $xdtCanonicalLicenseText
          )
          $xdtLicenseHasher = [Security.Cryptography.SHA256]::Create()
          try {
            $xdtLicenseSha256 = -join @(
              $xdtLicenseHasher.ComputeHash($xdtCanonicalLicenseBytes) |
                ForEach-Object { $_.ToString("x2") }
            )
          } finally {
            $xdtLicenseHasher.Dispose()
          }
          $xdtNoticePaths = @(
            git -C $xdtSource ls-tree -r --name-only HEAD |
              Where-Object {
                [IO.Path]::GetFileName($_) -imatch "^NOTICE(?:\..*)?$"
              }
          )
          $xdtDirty = @(git -C $xdtSource status --porcelain)
          $xdtCredentials = @(
            git -C $xdtSource config --local --get-regexp "^http\..*\.extraheader$" 2>$null
          )
          $xdtCredentialQueryExit = $LASTEXITCODE
          if ($xdtCredentialQueryExit -notin @(0, 1)) {
            throw "The Microsoft.Web.Xdt credential-state query failed."
          }
          $global:LASTEXITCODE = 0
          if (
            $xdtHead -cne $env:XDT_SOURCE_COMMIT -or
            $xdtTree -cne $env:XDT_SOURCE_TREE -or
            $xdtLicenseBlob -cne $env:XDT_LICENSE_BLOB -or
            $xdtLicense.PSIsContainer -or
            ($xdtLicense.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0 -or
            $xdtCanonicalLicenseBytes.Length -ne [int64]$env:XDT_LICENSE_BYTES -or
            $xdtLicenseSha256 -cne $env:XDT_LICENSE_SHA256 -or
            $xdtNoticePaths.Count -ne 0 -or
            $xdtDirty.Count -ne 0 -or
            $xdtCredentials.Count -ne 0
          ) {
            throw "The Microsoft.Web.Xdt source is not the exact reviewed Apache-2.0 tree."
          }

          foreach ($sourceName in @("squirrel-a", "squirrel-b")) {
            $source = Join-Path $env:GITHUB_WORKSPACE $sourceName
            $head = (git -C $source rev-parse HEAD).Trim()
            $tagObject = (git -C $source rev-parse "refs/tags/2.0.1").Trim()
            $tagCommit = (git -C $source rev-parse "refs/tags/2.0.1^{}").Trim()
            $baseDetectorBlob = (
              git -C $source rev-parse "$($env:SOURCE_BASE_COMMIT):src/Squirrel/SquirrelAwareExecutableDetector.cs"
            ).Trim()
            $nugetLink = (
              git -C $source rev-parse "$($env:SOURCE_BASE_COMMIT):vendor/nuget"
            ).Trim()
            $nugetHead = (git -C (Join-Path $source "vendor/nuget") rev-parse HEAD).Trim()
            $persistedCredentials = @(
              git -C $source config --local --get-regexp "^http\..*\.extraheader$" 2>$null
            )
            $credentialQueryExit = $LASTEXITCODE
            if ($credentialQueryExit -notin @(0, 1)) {
              throw "The upstream credential-state query failed."
            }
            $global:LASTEXITCODE = 0
            $fixParent = (git -C $source rev-parse "$($env:FIX_COMMIT)^").Trim()
            $fixTree = (git -C $source rev-parse "$($env:FIX_COMMIT)^{tree}").Trim()
            $fixDetectorBlob = (
              git -C $source rev-parse "$($env:FIX_COMMIT):src/Squirrel/SquirrelAwareExecutableDetector.cs"
            ).Trim()
            $fixChangedFiles = @(
              git -C $source diff-tree --no-commit-id --name-only -r $env:FIX_COMMIT
            )
            $mergeFixParent = (git -C $source rev-parse "$($env:UPSTREAM_MERGE_COMMIT)^2").Trim()
            $mergeDetectorBlob = (
              git -C $source rev-parse "$($env:UPSTREAM_MERGE_COMMIT):src/Squirrel/SquirrelAwareExecutableDetector.cs"
            ).Trim()
            $dirty = @(git -C $source status --porcelain --untracked-files=no)

            if (
              $head -cne $env:SOURCE_BASE_COMMIT -or
              $tagObject -cne $env:SOURCE_TAG_OBJECT -or
              $tagCommit -cne $env:SOURCE_BASE_COMMIT -or
              $baseDetectorBlob -cne $env:SOURCE_BASE_DETECTOR_BLOB -or
              $nugetLink -cne $env:NUGET_SUBMODULE_COMMIT -or
              $nugetHead -cne $env:NUGET_SUBMODULE_COMMIT -or
              $persistedCredentials.Count -ne 0 -or
              $fixParent -cne $env:SOURCE_BASE_COMMIT -or
              $fixTree -cne $env:FIX_TREE -or
              $fixDetectorBlob -cne $env:FIX_DETECTOR_BLOB -or
              $fixChangedFiles.Count -ne 1 -or
              $fixChangedFiles[0] -cne "src/Squirrel/SquirrelAwareExecutableDetector.cs" -or
              $mergeFixParent -cne $env:FIX_COMMIT -or
              $mergeDetectorBlob -cne $env:FIX_DETECTOR_BLOB -or
              $dirty.Count -ne 0
            ) {
              throw "The upstream graph is not the exact 2.0.1 base and merged one-file fix."
            }

            git -C $source checkout $env:FIX_COMMIT -- "src/Squirrel/SquirrelAwareExecutableDetector.cs"
            if ($LASTEXITCODE -ne 0) {
              throw "The reviewed Squirrel fix could not be reconstructed."
            }
            $changedFiles = @(git -C $source diff --cached --name-only)
            $reconstructedBlob = (
              git -C $source rev-parse ":src/Squirrel/SquirrelAwareExecutableDetector.cs"
            ).Trim()
            $reconstructedTree = (git -C $source write-tree).Trim()
            if (
              $changedFiles.Count -ne 1 -or
              $changedFiles[0] -cne "src/Squirrel/SquirrelAwareExecutableDetector.cs" -or
              $reconstructedBlob -cne $env:FIX_DETECTOR_BLOB -or
              $reconstructedTree -cne $env:FIX_TREE
            ) {
              throw "The reconstructed source is not the upstream-merged one-file fix."
            }

            git -C $source reset --hard $env:FIX_COMMIT
            if ($LASTEXITCODE -ne 0) {
              throw "The reconstructed source could not be bound to the exact fix commit."
            }
            $boundHead = (git -C $source rev-parse HEAD).Trim()
            $boundDirty = @(git -C $source status --porcelain --untracked-files=no)
            if ($boundHead -cne $env:FIX_COMMIT -or $boundDirty.Count -ne 0) {
              throw "The source tree was not cleanly bound to the exact fix commit."
            }

            git -C $source apply --check --index $retryPatch
            if ($LASTEXITCODE -ne 0) {
              throw "The bounded-delete source patch does not apply exactly."
            }
            git -C $source apply --index $retryPatch
            if ($LASTEXITCODE -ne 0) {
              throw "The bounded-delete source patch could not be applied."
            }
            git -C $source apply --check --index $xdtOuterPatch
            if ($LASTEXITCODE -ne 0) {
              throw "The outer XDT source patch does not apply exactly."
            }
            git -C $source apply --index $xdtOuterPatch
            if ($LASTEXITCODE -ne 0) {
              throw "The outer XDT source patch could not be applied."
            }

            $nugetSource = Join-Path $source "vendor/nuget"
            git -C $nugetSource apply --check --index $xdtInnerPatch
            if ($LASTEXITCODE -ne 0) {
              throw "The NuGet Core XDT source patch does not apply exactly."
            }
            git -C $nugetSource apply --index $xdtInnerPatch
            if ($LASTEXITCODE -ne 0) {
              throw "The NuGet Core XDT source patch could not be applied."
            }

            $patchedOuterFiles = @(
              git -C $source diff --cached --name-only
            )
            $expectedOuterFiles = @(
              "src/Squirrel/Squirrel.csproj"
              "src/Squirrel/Utility.cs"
              "test/SquirrelAwareExecutableDetectorTests.cs"
              "test/UtilityTests.cs"
            )
            $patchedInnerFiles = @(
              git -C $nugetSource diff --cached --name-only
            )
            $expectedInnerFiles = @(
              "src/Core/Core.csproj"
              "src/Core/packages.config"
            )
            $outerUnstagedFiles = @(git -C $source diff --name-only)
            $innerUnstagedFiles = @(git -C $nugetSource diff --name-only)
            $outerUntrackedFiles = @(
              git -C $source ls-files --others --exclude-standard
            )
            $innerUntrackedFiles = @(
              git -C $nugetSource ls-files --others --exclude-standard
            )
            $patchedSquirrelProjectBlob = (
              git -C $source rev-parse ":src/Squirrel/Squirrel.csproj"
            ).Trim()
            $patchedUtilityBlob = (
              git -C $source rev-parse ":src/Squirrel/Utility.cs"
            ).Trim()
            $patchedDetectorTestBlob = (
              git -C $source rev-parse ":test/SquirrelAwareExecutableDetectorTests.cs"
            ).Trim()
            $patchedUtilityTestBlob = (
              git -C $source rev-parse ":test/UtilityTests.cs"
            ).Trim()
            $patchedNugetProjectBlob = (
              git -C $nugetSource rev-parse ":src/Core/Core.csproj"
            ).Trim()
            $patchedNugetPackagesBlob = (
              git -C $nugetSource rev-parse ":src/Core/packages.config"
            ).Trim()
            $outerFileDifferences = @(
              Compare-Object $expectedOuterFiles $patchedOuterFiles -CaseSensitive
            )
            $innerFileDifferences = @(
              Compare-Object $expectedInnerFiles $patchedInnerFiles -CaseSensitive
            )
            if (
              $outerFileDifferences.Count -ne 0 -or
              $innerFileDifferences.Count -ne 0 -or
              $outerUnstagedFiles.Count -ne 1 -or
              $outerUnstagedFiles[0] -cne "vendor/nuget" -or
              $innerUnstagedFiles.Count -ne 0 -or
              $outerUntrackedFiles.Count -ne 0 -or
              $innerUntrackedFiles.Count -ne 0 -or
              $patchedSquirrelProjectBlob -cne $env:PATCHED_SQUIRREL_PROJECT_BLOB -or
              $patchedUtilityBlob -cne $env:PATCHED_UTILITY_BLOB -or
              $patchedDetectorTestBlob -cne $env:PATCHED_DETECTOR_TEST_BLOB -or
              $patchedUtilityTestBlob -cne $env:PATCHED_UTILITY_TEST_BLOB -or
              $patchedNugetProjectBlob -cne $env:PATCHED_NUGET_CORE_PROJECT_BLOB -or
              $patchedNugetPackagesBlob -cne $env:PATCHED_NUGET_CORE_PACKAGES_BLOB
            ) {
              throw "The patched Squirrel source trees do not match the reviewed changed-file and blob contracts."
            }
            git -C $source diff --cached --check
            if ($LASTEXITCODE -ne 0) {
              throw "The patched outer Squirrel source has whitespace errors."
            }
            git -C $nugetSource -c core.whitespace=cr-at-eol diff --cached --check
            if ($LASTEXITCODE -ne 0) {
              throw "The patched NuGet Core source has whitespace errors."
            }
          }

          $ilrepackSource = Join-Path $env:GITHUB_WORKSPACE "ilrepack-source"
          $ilrepackHead = (git -C $ilrepackSource rev-parse HEAD).Trim()
          $ilrepackTag = (git -C $ilrepackSource rev-parse "refs/tags/2.0.24^{}").Trim()
          $ilrepackTree = (git -C $ilrepackSource rev-parse "HEAD^{tree}").Trim()
          $ilrepackImporterBlob = (
            git -C $ilrepackSource rev-parse "HEAD:ILRepack/RepackImporter.cs"
          ).Trim()
          $ilrepackLicenseBlob = (git -C $ilrepackSource rev-parse "HEAD:LICENSE").Trim()
          git -C $ilrepackSource merge-base --is-ancestor $env:ILREPACK_SOURCE_COMMIT $env:ILREPACK_RELEASE_TAG_COMMIT
          $ilrepackSourcePredatesTag = $LASTEXITCODE -eq 0
          $ilrepackDirty = @(git -C $ilrepackSource status --porcelain --untracked-files=no)
          $ilrepackPersistedCredentials = @(
            git -C $ilrepackSource config --local --get-regexp "^http\..*\.extraheader$" 2>$null
          )
          $ilrepackCredentialQueryExit = $LASTEXITCODE
          if ($ilrepackCredentialQueryExit -notin @(0, 1)) {
            throw "The ILRepack credential-state query failed."
          }
          $global:LASTEXITCODE = 0
          if (
            $ilrepackHead -cne $env:ILREPACK_SOURCE_COMMIT -or
            $ilrepackTag -cne $env:ILREPACK_RELEASE_TAG_COMMIT -or
            $ilrepackTree -cne $env:ILREPACK_SOURCE_TREE -or
            -not $ilrepackSourcePredatesTag -or
            $ilrepackImporterBlob -cne $env:ILREPACK_IMPORTER_BLOB -or
            $ilrepackLicenseBlob -cne $env:ILREPACK_LICENSE_BLOB -or
            $ilrepackDirty.Count -ne 0 -or
            $ilrepackPersistedCredentials.Count -ne 0
          ) {
            throw "The deterministic ILRepack source is not the exact reviewed 2.0.24 tree."
          }

      - name: Build twice with isolated dependency caches
        id: build
        shell: pwsh
        env:
          RECEIPT_MODE: ${{ inputs.derive_candidate && 'derive' || 'locked' }}
          TOKENMONSTER_POLICY_SHA: ${{ github.workflow_sha }}
          BROKEN_UPDATER_SHA256: 76359cd4b0349a83337b941332ad042c90351c2bb0a4628307740324c97984cc
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          DOTNET_NOLOGO: 1
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
          NUGET_URL: https://dist.nuget.org/win-x86-commandline/v4.9.4/nuget.exe
          NUGET_SHA256: cb139d855d06d07e7da892e8558fe16dcaa65cb381175c506f5ed0a759eaf8f6
          NUGET_SOURCE: https://api.nuget.org/v3/index.json
          REFERENCE_ASSEMBLIES_URL: https://api.nuget.org/v3-flatcontainer/microsoft.netframework.referenceassemblies.net45/1.0.3/microsoft.netframework.referenceassemblies.net45.1.0.3.nupkg
          REFERENCE_ASSEMBLIES_SHA256: 23a9f94ea3e2cb88cd8341af75b811c6fb5cb82516fc696e95ed4620279128e3
          ILREPACK_URL: https://api.nuget.org/v3-flatcontainer/ilrepack/2.0.24/ilrepack.2.0.24.nupkg
          ILREPACK_PACKAGE_SHA256: 4354440d0b1ad531ef2dfd9f112fde80018b9d1534c25d10afe728146a6f67be
          ILREPACK_TOOL_SHA256: adc25f9933da1e9d660ba41d2f6ae8181b7383bc2c08b869a03b10aac2dd9ab5
          ILREPACK_RUNTIMECONFIG_SHA256: f528ed48a5ea5a5dafc7460a4db46c0a95823a806c523ec914250aa1e5798782
          ILREPACK_RUNTIME_VERSION: 6.0.43
          ILREPACK_SOURCE_COMMIT: 5b55fa2f4d7c7b18ffb104e2fade2f794f4ccedf
          ILREPACK_SOURCE_TREE: 4c7e73b48c55a535790f9d3f56687258efc525d0
          ILREPACK_RELEASE_TAG_COMMIT: 92843eace06c4eff3d6296a6fc4470ba725c57aa
          SOURCE_BASE_COMMIT: eef37460aef77b2f9de8cd2237c1e55b344a6554
          FIX_COMMIT: c98244936f6876b080366417301268058028a53c
          FIX_TREE: 0a1ebfa90cea6f8037907134d53562a26c6bb4c3
          UPSTREAM_MERGE_COMMIT: 45834cbfeae84d20ef2bed24ac863f02d0abec66
          NUGET_SUBMODULE_COMMIT: 50f8d9e438fe948d7109501bd10f6024d0585b70
          RETRY_PATCH_SHA256: 81a6bb631b7459773fbad1b4fbe7a878c698ab9e6016899a3f422b3fa32e2b1a
          RETRY_PATCH_BYTES: 4545
