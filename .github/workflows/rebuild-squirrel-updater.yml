            "global/microsoft.web.xdt/3.1.0/microsoft.web.xdt.3.1.0.nupkg.sha512`t3VApgkdgOglJWtrXSgYzz6o8Cp6IpvmFQMeICyQvvbKoy+OjNwco5ovzBBL1HHj7kEgLfe2ruXW/ZQ1k+2YxYw=="
            "global/mono.cecil/0.11.2/mono.cecil.0.11.2.nupkg.sha512`tBTpKT6mzbvLgXKWSilfGOn0we1JeJb7VWu2f1lJ3ABJqCqoZlNCdi90BMiTJl+9DdJ5MqH3pokN873IjM3vi/Q=="
