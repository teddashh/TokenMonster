          function Assert-IsolatedProjectAssets {
            param(
              [Parameter(Mandatory)] [string] $AssetsPath,
              [Parameter(Mandatory)] [string] $PackageRoot,
              [Parameter(Mandatory)] [string] $ConfigPath
            )

            if (-not (Test-Path -LiteralPath $AssetsPath -PathType Leaf)) {
              throw "The exact PackageReference restore did not produce $AssetsPath."
            }
            $assets = Get-Content -LiteralPath $AssetsPath -Raw | ConvertFrom-Json
            $packageFolders = @($assets.packageFolders.PSObject.Properties.Name)
            $sources = @($assets.project.restore.sources.PSObject.Properties.Name)
            $configFiles = @($assets.project.restore.configFilePaths)
            $expectedPackageRoot = [IO.Path]::TrimEndingDirectorySeparator(
              [IO.Path]::GetFullPath($PackageRoot)
            )
            $actualPackageRoot = if ($packageFolders.Count -eq 1) {
              [IO.Path]::TrimEndingDirectorySeparator(
                [IO.Path]::GetFullPath($packageFolders[0])
              )
            } else {
              ""
            }
            $unexpectedReferencePackages = @(
              $assets.libraries.PSObject.Properties.Name |
                Where-Object { $_ -match "^Microsoft\.NETFramework\.ReferenceAssemblies" }
            )
            if (
              $packageFolders.Count -ne 1 -or
              $actualPackageRoot -ine $expectedPackageRoot -or
              $sources.Count -ne 1 -or
              $sources[0] -cne $env:NUGET_SOURCE -or
              $configFiles.Count -ne 1 -or
              [IO.Path]::GetFullPath($configFiles[0]) -ine [IO.Path]::GetFullPath($ConfigPath) -or
              $unexpectedReferencePackages.Count -ne 0
            ) {
              throw "The PackageReference restore escaped its reviewed source, config, package root, or reference inputs."
            }
          }

          function Assert-XdtProjectAssets {
            param(
              [Parameter(Mandatory)] [string] $AssetsPath
            )

            $assets = Get-Content -LiteralPath $AssetsPath -Raw | ConvertFrom-Json
            $expectedLibrary = "Microsoft.Web.Xdt/3.1.0"
            $xdtLibraries = @(
              $assets.libraries.PSObject.Properties |
                Where-Object { $_.Name -imatch "^Microsoft\.Web\.Xdt/" }
            )
            $xdtTargets = @()
            foreach ($target in $assets.targets.PSObject.Properties) {
              $xdtTarget = $target.Value.PSObject.Properties[$expectedLibrary]
              if ($null -ne $xdtTarget) {
                $xdtTargets += ,$xdtTarget
              }
            }
            if ($xdtLibraries.Count -ne 1 -or $xdtLibraries[0].Name -cne $expectedLibrary -or $xdtTargets.Count -ne 1) {
              throw "The Squirrel restore did not resolve exactly Microsoft.Web.Xdt 3.1.0."
            }
            $compile = $xdtTargets[0].Value.PSObject.Properties["compile"]
            $runtime = $xdtTargets[0].Value.PSObject.Properties["runtime"]
            $compilePaths = @(
              if ($null -ne $compile) {
                $compile.Value.PSObject.Properties.Name
              }
            )
            $runtimePaths = @(
              if ($null -ne $runtime) {
                $runtime.Value.PSObject.Properties.Name
              }
            )
            if (
              $compilePaths.Count -ne 1 -or
              $compilePaths[0] -cne "lib/net40/Microsoft.Web.XmlTransform.dll" -or
              $runtimePaths.Count -ne 1 -or
              $runtimePaths[0] -cne "lib/net40/Microsoft.Web.XmlTransform.dll"
            ) {
              throw "The Squirrel restore selected an unreviewed Microsoft.Web.Xdt asset."
            }
          }

          function Assert-XdtAssembly {
            param(
              [Parameter(Mandatory)] [string] $Path
            )

            $file = Get-Item -LiteralPath $Path -Force
            $hash = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            $assemblyName = [Reflection.AssemblyName]::GetAssemblyName($file.FullName)
            $publicKeyToken = -join @(
              $assemblyName.GetPublicKeyToken() |
                ForEach-Object { $_.ToString("x2") }
            )
            $stream = [IO.File]::Open(
              $file.FullName,
              [IO.FileMode]::Open,
              [IO.FileAccess]::Read,
              [IO.FileShare]::Read
            )
            try {
              $peReader = [Reflection.PortableExecutable.PEReader]::new($stream)
              try {
                if (-not $peReader.HasMetadata) {
                  throw "The Microsoft.Web.Xdt DLL has no managed metadata."
                }
                $metadata = [Reflection.Metadata.PEReaderExtensions]::GetMetadataReader($peReader)
                $module = $metadata.GetModuleDefinition()
                $mvid = $metadata.GetGuid($module.Mvid).ToString("D")
              } finally {
                $peReader.Dispose()
              }
            } finally {
              $stream.Dispose()
            }
            if (
              $file.PSIsContainer -or
              ($file.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0 -or
              $file.Length -ne [int64]$env:XDT_DLL_BYTES -or
              $hash -cne $env:XDT_DLL_SHA256 -or
              $assemblyName.Name -cne "Microsoft.Web.XmlTransform" -or
              $assemblyName.Version.ToString() -cne $env:XDT_ASSEMBLY_VERSION -or
              $publicKeyToken -cne $env:XDT_PUBLIC_KEY_TOKEN -or
              $mvid -cne $env:XDT_MVID
            ) {
              throw "A restored Microsoft.Web.Xdt assembly does not match its exact reviewed identity."
            }
          }

          function Get-ManagedMetadataReceipt {
            param(
              [Parameter(Mandatory)] [string] $Path
            )

            $stream = [IO.File]::Open(
              $Path,
              [IO.FileMode]::Open,
              [IO.FileAccess]::Read,
              [IO.FileShare]::Read
            )
            try {
              $peReader = [Reflection.PortableExecutable.PEReader]::new($stream)
              try {
                if (-not $peReader.HasMetadata) {
                  throw "A reviewed merge input has no managed metadata."
                }
                $metadata = [Reflection.Metadata.PEReaderExtensions]::GetMetadataReader($peReader)
                $references = @(
                  foreach ($handle in $metadata.AssemblyReferences) {
                    $reference = $metadata.GetAssemblyReference($handle)
                    $token = -join @(
                      $metadata.GetBlobBytes($reference.PublicKeyOrToken) |
                        ForEach-Object { $_.ToString("x2") }
                    )
                    [pscustomobject]@{
                      Name = $metadata.GetString($reference.Name)
                      Version = $reference.Version.ToString()
                      PublicKeyToken = $token
                    }
                  }
                )
                $types = @(
                  foreach ($handle in $metadata.TypeDefinitions) {
                    $definition = $metadata.GetTypeDefinition($handle)
                    $namespace = $metadata.GetString($definition.Namespace)
                    $name = $metadata.GetString($definition.Name)
                    if ([String]::IsNullOrEmpty($namespace)) {
                      $name
                    } else {
                      "$namespace.$name"
                    }
                  }
                )
              } finally {
                $peReader.Dispose()
              }
            } finally {
              $stream.Dispose()
            }
            return [pscustomobject]@{
              AssemblyReferences = $references
              TypeDefinitions = $types
            }
          }

          function Assert-MergedXdtBehavior {
            param(
              [Parameter(Mandatory)] [string] $Path
            )

            $assembly = [Reflection.Assembly]::LoadFrom($Path)
            $documentType = $assembly.GetType(
              "Microsoft.Web.XmlTransform.XmlTransformableDocument",
              $true,
              $false
            )
            $transformationType = $assembly.GetType(
              "Microsoft.Web.XmlTransform.XmlTransformation",
              $true,
              $false
            )
            $instanceFlags = (
              [Reflection.BindingFlags]::Instance -bor
              [Reflection.BindingFlags]::Public -bor
              [Reflection.BindingFlags]::NonPublic
            )
            $constructors = @(
              $transformationType.GetConstructors($instanceFlags) |
                Where-Object {
                  $parameters = @($_.GetParameters())
                  $parameters.Count -eq 3 -and
                  $parameters[0].ParameterType -eq [string] -and
                  $parameters[1].ParameterType -eq [bool] -and
                  $parameters[2].ParameterType.FullName -ceq "Microsoft.Web.XmlTransform.IXmlTransformationLogger"
                }
            )
            $applyMethods = @(
              $transformationType.GetMethods($instanceFlags) |
                Where-Object {
                  $parameters = @($_.GetParameters())
                  $_.Name -ceq "Apply" -and
                  $parameters.Count -eq 1 -and
                  $parameters[0].ParameterType -eq [Xml.XmlDocument]
                }
            )
            if ($constructors.Count -ne 1 -or $applyMethods.Count -ne 1) {
              throw "The internalized Microsoft.Web.Xdt reflection surface is unexpected."
            }

            $sourceXml = "<configuration><appSettings><add key=`"replace`" value=`"old`" /><add key=`"remove`" value=`"drop`" /></appSettings></configuration>"
            $transformXml = "<configuration xmlns:xdt=`"http://schemas.microsoft.com/XML-Document-Transform`"><appSettings><add key=`"replace`" value=`"new`" xdt:Transform=`"Replace`" xdt:Locator=`"Match(key)`" /><add key=`"insert`" value=`"created`" xdt:Transform=`"InsertIfMissing`" xdt:Locator=`"Match(key)`" /><add key=`"remove`" xdt:Transform=`"Remove`" xdt:Locator=`"Match(key)`" /></appSettings></configuration>"
            $document = [Activator]::CreateInstance($documentType, $true)
            $document.PreserveWhitespace = $true
            $document.LoadXml($sourceXml)
            $transformation = $constructors[0].Invoke(
              [object[]]@($transformXml, $false, $null)
            )
            try {
              $applied = $applyMethods[0].Invoke(
                $transformation,
                [object[]]@($document)
              )
            } finally {
              if ($transformation -is [IDisposable]) {
                $transformation.Dispose()
              }
            }
            $replace = $document.SelectSingleNode(
              "/configuration/appSettings/add[@key='replace']"
            )
            $insert = $document.SelectSingleNode(
              "/configuration/appSettings/add[@key='insert']"
            )
            $remove = $document.SelectSingleNode(
              "/configuration/appSettings/add[@key='remove']"
            )
            $allSettings = $document.SelectNodes("/configuration/appSettings/add")
            if (
              $applied -ne $true -or
              $null -eq $replace -or
              $replace.GetAttribute("value") -cne "new" -or
              $null -eq $insert -or
              $insert.GetAttribute("value") -cne "created" -or
              $null -ne $remove -or
              $allSettings.Count -ne 2
            ) {
              throw "The internalized Microsoft.Web.Xdt behavior smoke failed."
            }

            $malformedRejected = $false
            $malformedTransformation = $null
            try {
              $malformedTransformation = $constructors[0].Invoke(
                [object[]]@("<configuration>", $false, $null)
              )
            } catch {
              $malformedRejected = $true
            } finally {
              if ($malformedTransformation -is [IDisposable]) {
                $malformedTransformation.Dispose()
              }
            }
            if (-not $malformedRejected) {
              throw "The internalized Microsoft.Web.Xdt accepted malformed transform XML."
            }
          }

          function Assert-XdtPackage {
            param(
              [Parameter(Mandatory)] [string] $Path
            )

            $file = Get-Item -LiteralPath $Path -Force
            $hash = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            if (
              $file.PSIsContainer -or
              ($file.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0 -or
              $file.Length -ne [int64]$env:XDT_PACKAGE_BYTES -or
              $hash -cne $env:XDT_PACKAGE_SHA256
            ) {
              throw "A restored Microsoft.Web.Xdt package does not match its exact reviewed bytes."
            }
            & $nuget verify -Signatures $file.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "A restored Microsoft.Web.Xdt package signature is invalid."
            }
