name: Rebuild reviewed Squirrel updater

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rebuild-reviewed-updater:
    name: Rebuild reviewed Squirrel updater twice
    runs-on: windows-2022
    timeout-minutes: 25

    steps:
      - name: Check out exact upstream source A
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Squirrel/Squirrel.Windows
          ref: eef37460aef77b2f9de8cd2237c1e55b344a6554
          path: squirrel-a
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Check out exact upstream source B
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Squirrel/Squirrel.Windows
          ref: eef37460aef77b2f9de8cd2237c1e55b344a6554
          path: squirrel-b
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Check out exact deterministic ILRepack source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: gluck/il-repack
          ref: 5b55fa2f4d7c7b18ffb104e2fade2f794f4ccedf
          path: ilrepack-source
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact upstream identities and reviewed build-tool source
        shell: pwsh
        env:
          SOURCE_TAG_OBJECT: 274f7a9a5dc211552f27d1da7dc7899546a52be3
          SOURCE_BASE_COMMIT: eef37460aef77b2f9de8cd2237c1e55b344a6554
          SOURCE_BASE_DETECTOR_BLOB: 0fdefda329abf979a2c739f02761e3d4ec8e30de
          FIX_COMMIT: c98244936f6876b080366417301268058028a53c
          FIX_TREE: 0a1ebfa90cea6f8037907134d53562a26c6bb4c3
          FIX_DETECTOR_BLOB: e8e442e0d95c5b7f5cc31a2eb84cf9407f5be2ab
          UPSTREAM_MERGE_COMMIT: 45834cbfeae84d20ef2bed24ac863f02d0abec66
          NUGET_SUBMODULE_COMMIT: 50f8d9e438fe948d7109501bd10f6024d0585b70
          ILREPACK_SOURCE_COMMIT: 5b55fa2f4d7c7b18ffb104e2fade2f794f4ccedf
          ILREPACK_SOURCE_TREE: 4c7e73b48c55a535790f9d3f56687258efc525d0
          ILREPACK_RELEASE_TAG_COMMIT: 92843eace06c4eff3d6296a6fc4470ba725c57aa
          ILREPACK_IMPORTER_BLOB: 07ea3c6054587b2dca44121ca99762b950b103c2
          ILREPACK_LICENSE_BLOB: d645695673349e3947e8e5ae42332d0ac3164cd7
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          foreach ($sourceName in @("squirrel-a", "squirrel-b")) {
            $source = Join-Path $env:GITHUB_WORKSPACE $sourceName
            $head = (git -C $source rev-parse HEAD).Trim()
            $tagObject = (git -C $source rev-parse "refs/tags/2.0.1").Trim()
            $tagCommit = (git -C $source rev-parse "refs/tags/2.0.1^{}").Trim()
            $baseDetectorBlob = (
              git -C $source rev-parse "$($env:SOURCE_BASE_COMMIT):src/Squirrel/SquirrelAwareExecutableDetector.cs"
            ).Trim()
            $nugetLink = (
              git -C $source rev-parse "$($env:SOURCE_BASE_COMMIT):vendor/nuget"
            ).Trim()
            $nugetHead = (git -C (Join-Path $source "vendor/nuget") rev-parse HEAD).Trim()
            $persistedCredentials = @(
              git -C $source config --local --get-regexp "^http\..*\.extraheader$" 2>$null
            )
            $credentialQueryExit = $LASTEXITCODE
            if ($credentialQueryExit -notin @(0, 1)) {
              throw "The upstream credential-state query failed."
            }
            $global:LASTEXITCODE = 0
            $fixParent = (git -C $source rev-parse "$($env:FIX_COMMIT)^").Trim()
            $fixTree = (git -C $source rev-parse "$($env:FIX_COMMIT)^{tree}").Trim()
            $fixDetectorBlob = (
              git -C $source rev-parse "$($env:FIX_COMMIT):src/Squirrel/SquirrelAwareExecutableDetector.cs"
            ).Trim()
            $fixChangedFiles = @(
              git -C $source diff-tree --no-commit-id --name-only -r $env:FIX_COMMIT
            )
            $mergeFixParent = (git -C $source rev-parse "$($env:UPSTREAM_MERGE_COMMIT)^2").Trim()
            $mergeDetectorBlob = (
              git -C $source rev-parse "$($env:UPSTREAM_MERGE_COMMIT):src/Squirrel/SquirrelAwareExecutableDetector.cs"
            ).Trim()
            $dirty = @(git -C $source status --porcelain --untracked-files=no)

            if (
              $head -cne $env:SOURCE_BASE_COMMIT -or
              $tagObject -cne $env:SOURCE_TAG_OBJECT -or
              $tagCommit -cne $env:SOURCE_BASE_COMMIT -or
              $baseDetectorBlob -cne $env:SOURCE_BASE_DETECTOR_BLOB -or
              $nugetLink -cne $env:NUGET_SUBMODULE_COMMIT -or
              $nugetHead -cne $env:NUGET_SUBMODULE_COMMIT -or
              $persistedCredentials.Count -ne 0 -or
              $fixParent -cne $env:SOURCE_BASE_COMMIT -or
              $fixTree -cne $env:FIX_TREE -or
              $fixDetectorBlob -cne $env:FIX_DETECTOR_BLOB -or
              $fixChangedFiles.Count -ne 1 -or
              $fixChangedFiles[0] -cne "src/Squirrel/SquirrelAwareExecutableDetector.cs" -or
              $mergeFixParent -cne $env:FIX_COMMIT -or
              $mergeDetectorBlob -cne $env:FIX_DETECTOR_BLOB -or
              $dirty.Count -ne 0
            ) {
              throw "The upstream graph is not the exact 2.0.1 base and merged one-file fix."
            }

            git -C $source checkout $env:FIX_COMMIT -- "src/Squirrel/SquirrelAwareExecutableDetector.cs"
            if ($LASTEXITCODE -ne 0) {
              throw "The reviewed Squirrel fix could not be reconstructed."
            }
            $changedFiles = @(git -C $source diff --cached --name-only)
            $reconstructedBlob = (
              git -C $source rev-parse ":src/Squirrel/SquirrelAwareExecutableDetector.cs"
            ).Trim()
            $reconstructedTree = (git -C $source write-tree).Trim()
            if (
              $changedFiles.Count -ne 1 -or
              $changedFiles[0] -cne "src/Squirrel/SquirrelAwareExecutableDetector.cs" -or
              $reconstructedBlob -cne $env:FIX_DETECTOR_BLOB -or
              $reconstructedTree -cne $env:FIX_TREE
            ) {
              throw "The reconstructed source is not the upstream-merged one-file fix."
            }

            git -C $source reset --hard $env:FIX_COMMIT
            if ($LASTEXITCODE -ne 0) {
              throw "The reconstructed source could not be bound to the exact fix commit."
            }
            $boundHead = (git -C $source rev-parse HEAD).Trim()
            $boundDirty = @(git -C $source status --porcelain --untracked-files=no)
            if ($boundHead -cne $env:FIX_COMMIT -or $boundDirty.Count -ne 0) {
              throw "The source tree was not cleanly bound to the exact fix commit."
            }
          }

          $ilrepackSource = Join-Path $env:GITHUB_WORKSPACE "ilrepack-source"
          $ilrepackHead = (git -C $ilrepackSource rev-parse HEAD).Trim()
          $ilrepackTag = (git -C $ilrepackSource rev-parse "refs/tags/2.0.24^{}").Trim()
          $ilrepackTree = (git -C $ilrepackSource rev-parse "HEAD^{tree}").Trim()
          $ilrepackImporterBlob = (
            git -C $ilrepackSource rev-parse "HEAD:ILRepack/RepackImporter.cs"
          ).Trim()
          $ilrepackLicenseBlob = (git -C $ilrepackSource rev-parse "HEAD:LICENSE").Trim()
          git -C $ilrepackSource merge-base --is-ancestor $env:ILREPACK_SOURCE_COMMIT $env:ILREPACK_RELEASE_TAG_COMMIT
          $ilrepackSourcePredatesTag = $LASTEXITCODE -eq 0
          $ilrepackDirty = @(git -C $ilrepackSource status --porcelain --untracked-files=no)
          $ilrepackPersistedCredentials = @(
            git -C $ilrepackSource config --local --get-regexp "^http\..*\.extraheader$" 2>$null
          )
          $ilrepackCredentialQueryExit = $LASTEXITCODE
          if ($ilrepackCredentialQueryExit -notin @(0, 1)) {
            throw "The ILRepack credential-state query failed."
          }
          $global:LASTEXITCODE = 0
          if (
            $ilrepackHead -cne $env:ILREPACK_SOURCE_COMMIT -or
            $ilrepackTag -cne $env:ILREPACK_RELEASE_TAG_COMMIT -or
            $ilrepackTree -cne $env:ILREPACK_SOURCE_TREE -or
            -not $ilrepackSourcePredatesTag -or
            $ilrepackImporterBlob -cne $env:ILREPACK_IMPORTER_BLOB -or
            $ilrepackLicenseBlob -cne $env:ILREPACK_LICENSE_BLOB -or
            $ilrepackDirty.Count -ne 0 -or
            $ilrepackPersistedCredentials.Count -ne 0
          ) {
            throw "The deterministic ILRepack source is not the exact reviewed 2.0.24 tree."
          }

      - name: Build twice with isolated dependency caches
        id: build
        shell: pwsh
        env:
          BROKEN_UPDATER_SHA256: 76359cd4b0349a83337b941332ad042c90351c2bb0a4628307740324c97984cc
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          DOTNET_NOLOGO: 1
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
          NUGET_URL: https://dist.nuget.org/win-x86-commandline/v4.9.4/nuget.exe
          NUGET_SHA256: cb139d855d06d07e7da892e8558fe16dcaa65cb381175c506f5ed0a759eaf8f6
          NUGET_SOURCE: https://api.nuget.org/v3/index.json
          REFERENCE_ASSEMBLIES_URL: https://api.nuget.org/v3-flatcontainer/microsoft.netframework.referenceassemblies.net45/1.0.3/microsoft.netframework.referenceassemblies.net45.1.0.3.nupkg
          REFERENCE_ASSEMBLIES_SHA256: 23a9f94ea3e2cb88cd8341af75b811c6fb5cb82516fc696e95ed4620279128e3
          ILREPACK_URL: https://api.nuget.org/v3-flatcontainer/ilrepack/2.0.24/ilrepack.2.0.24.nupkg
          ILREPACK_PACKAGE_SHA256: 4354440d0b1ad531ef2dfd9f112fde80018b9d1534c25d10afe728146a6f67be
          ILREPACK_TOOL_SHA256: adc25f9933da1e9d660ba41d2f6ae8181b7383bc2c08b869a03b10aac2dd9ab5
          ILREPACK_RUNTIMECONFIG_SHA256: f528ed48a5ea5a5dafc7460a4db46c0a95823a806c523ec914250aa1e5798782
          ILREPACK_RUNTIME_VERSION: 6.0.43
          ILREPACK_SOURCE_COMMIT: 5b55fa2f4d7c7b18ffb104e2fade2f794f4ccedf
          ILREPACK_SOURCE_TREE: 4c7e73b48c55a535790f9d3f56687258efc525d0
          ILREPACK_RELEASE_TAG_COMMIT: 92843eace06c4eff3d6296a6fc4470ba725c57aa
          SOURCE_BASE_COMMIT: eef37460aef77b2f9de8cd2237c1e55b344a6554
          FIX_COMMIT: c98244936f6876b080366417301268058028a53c
          FIX_TREE: 0a1ebfa90cea6f8037907134d53562a26c6bb4c3
          UPSTREAM_MERGE_COMMIT: 45834cbfeae84d20ef2bed24ac863f02d0abec66
          NUGET_SUBMODULE_COMMIT: 50f8d9e438fe948d7109501bd10f6024d0585b70
          REVIEWED_DEPENDENCY_INVENTORY_SHA256: fb9199730812ca5c569d0c44f8d79d910665651dba7b3fa4cf498996c17aac15
          REVIEWED_MERGE_INPUT_INVENTORY_SHA256: abddfa18198a408cd1b1d3983ce6afdd4eab4a1f4dcec5cbd4b2a0437104c419
          REVIEWED_UPDATER_SHA256: 1673161fd4e64d1123fb828a5e5f1580cbe3c3f6b3f0893f50bb920dada473fd
          REVIEWED_UPDATER_BYTES: 1840640
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio/Installer/vswhere.exe"
          if (-not (Test-Path -LiteralPath $vswhere -PathType Leaf)) {
            throw "The reviewed Windows runner lacks vswhere.exe."
          }
          $msbuildCandidates = @(
            & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe"
          )
          if ($msbuildCandidates.Count -ne 1) {
            throw "The reviewed Windows runner did not resolve exactly one MSBuild executable."
          }
          $msbuild = $msbuildCandidates[0]
          $msbuildVersion = (& $msbuild -version -nologo | Select-Object -Last 1).Trim()
          if ($LASTEXITCODE -ne 0 -or [String]::IsNullOrWhiteSpace($msbuildVersion)) {
            throw "MSBuild did not report a version."
          }
          $dotnetInfo = @(& dotnet --info)
          if ($LASTEXITCODE -ne 0 -or $dotnetInfo.Count -lt 1) {
            throw "The reviewed Windows runner did not report its .NET SDK inventory."
          }
          $dotnetRuntimes = @(& dotnet --list-runtimes)
          if (
            $LASTEXITCODE -ne 0 -or
            @($dotnetRuntimes | Where-Object { $_ -match "^Microsoft\.NETCore\.App $([regex]::Escape($env:ILREPACK_RUNTIME_VERSION)) \[" }).Count -ne 1
          ) {
            throw "The reviewed Windows runner lacks the exact ILRepack runtime."
          }

          foreach ($credentialVariable in @(
            "ACTIONS_ID_TOKEN_REQUEST_TOKEN",
            "ACTIONS_RUNTIME_TOKEN",
            "GH_TOKEN",
            "GITHUB_TOKEN",
            "NODE_AUTH_TOKEN",
            "NUGET_AUTH_TOKEN",
            "SYSTEM_ACCESSTOKEN"
          )) {
            Remove-Item "Env:$credentialVariable" -ErrorAction SilentlyContinue
          }
          # Nerdbank.GitVersioning 3.0.50 predates GitHub's environment-file
          # protocol. Keep its normal MSBuild versioning while preventing it
          # from emitting the retired workflow-command form of set-env.
          Remove-Item Env:GITHUB_ACTIONS -ErrorAction SilentlyContinue

          $nuget = Join-Path $env:RUNNER_TEMP "nuget-4.9.4.exe"
          if (Test-Path -LiteralPath $nuget) {
            throw "The exact NuGet bootstrap path must start absent."
          }
          Invoke-WebRequest -Uri $env:NUGET_URL -OutFile $nuget -MaximumRedirection 0
          $nugetFile = Get-Item -LiteralPath $nuget
          $nugetSha256 = (Get-FileHash -LiteralPath $nuget -Algorithm SHA256).Hash.ToLowerInvariant()
          $nugetSignature = Get-AuthenticodeSignature -LiteralPath $nuget
          if (
            $nugetFile.Length -ne 5690456 -or
            $nugetSha256 -cne $env:NUGET_SHA256 -or
            $nugetFile.VersionInfo.FileVersion -cne "4.9.4.5839" -or
            $nugetFile.VersionInfo.ProductVersion -cne "4.9.4+ed6e2dca9391d13b431f4eff58c5194f0ebcee13" -or
            $nugetSignature.Status -cne "Valid" -or
            $nugetSignature.SignerCertificate.Thumbprint -cne "9DC17888B5CFAD98B3CB35C1994E96227F061675" -or
            $nugetSignature.SignerCertificate.Subject -notmatch "(?:^|, )O=Microsoft Corporation(?:,|$)"
          ) {
            throw "The downloaded NuGet 4.9.4 bootstrap is not the reviewed Microsoft binary."
          }
          $nugetVersion = $nugetFile.VersionInfo.FileVersion

          $referencePackage = Join-Path $env:RUNNER_TEMP "microsoft.netframework.referenceassemblies.net45.1.0.3.nupkg"
          $referenceRoot = Join-Path $env:RUNNER_TEMP "net45-reference-assemblies"
          if (
            (Test-Path -LiteralPath $referencePackage) -or
            (Test-Path -LiteralPath $referenceRoot)
          ) {
            throw "The exact .NET Framework reference-assembly paths must start absent."
          }
          Invoke-WebRequest -Uri $env:REFERENCE_ASSEMBLIES_URL -OutFile $referencePackage -MaximumRedirection 0
          $referencePackageFile = Get-Item -LiteralPath $referencePackage
          $referencePackageSha256 = (Get-FileHash -LiteralPath $referencePackage -Algorithm SHA256).Hash.ToLowerInvariant()
          if (
            $referencePackageFile.Length -ne 19820444 -or
            $referencePackageSha256 -cne $env:REFERENCE_ASSEMBLIES_SHA256
          ) {
            throw "The .NET Framework 4.5 reference-assembly package is not the reviewed NuGet binary."
          }
          & $nuget verify -Signatures $referencePackage
          if ($LASTEXITCODE -ne 0) {
            throw "The exact .NET Framework reference-assembly NuGet signature is invalid."
          }
          New-Item -ItemType Directory -Path $referenceRoot | Out-Null
          [IO.Compression.ZipFile]::ExtractToDirectory($referencePackage, $referenceRoot)
          $referenceBuildRoot = Join-Path $referenceRoot "build"
          $referenceMscorlib = Join-Path $referenceBuildRoot ".NETFramework/v4.5/mscorlib.dll"
          $referenceTargets = Join-Path $referenceBuildRoot "Microsoft.NETFramework.ReferenceAssemblies.net45.targets"
          if (
            -not (Test-Path -LiteralPath $referenceMscorlib -PathType Leaf) -or
            -not (Test-Path -LiteralPath $referenceTargets -PathType Leaf)
          ) {
            throw "The reviewed reference-assembly package lacks its exact net45 build inputs."
          }

          $ilrepackPackage = Join-Path $env:RUNNER_TEMP "ilrepack.2.0.24.nupkg"
          $ilrepackPackageRoot = Join-Path $env:RUNNER_TEMP "ilrepack.2.0.24"
          if (
            (Test-Path -LiteralPath $ilrepackPackage) -or
            (Test-Path -LiteralPath $ilrepackPackageRoot)
          ) {
            throw "The reviewed deterministic ILRepack paths must start absent."
          }
          Invoke-WebRequest -Uri $env:ILREPACK_URL -OutFile $ilrepackPackage -MaximumRedirection 0
          $ilrepackPackageFile = Get-Item -LiteralPath $ilrepackPackage
          $ilrepackPackageSha256 = (
            Get-FileHash -LiteralPath $ilrepackPackage -Algorithm SHA256
          ).Hash.ToLowerInvariant()
          if (
            $ilrepackPackageFile.Length -ne 726144 -or
            $ilrepackPackageSha256 -cne $env:ILREPACK_PACKAGE_SHA256
          ) {
            throw "The deterministic ILRepack package is not the reviewed NuGet binary."
          }
          & $nuget verify -Signatures $ilrepackPackage
          if ($LASTEXITCODE -ne 0) {
            throw "The exact deterministic ILRepack NuGet signature is invalid."
          }
          New-Item -ItemType Directory -Path $ilrepackPackageRoot | Out-Null
          [IO.Compression.ZipFile]::ExtractToDirectory($ilrepackPackage, $ilrepackPackageRoot)
          $ilrepackTool = Join-Path $ilrepackPackageRoot "tools/ILRepack.exe"
          $ilrepackRuntimeConfig = Join-Path $ilrepackPackageRoot "tools/ILRepack.runtimeconfig.json"
          $ilrepackVersionInfo = (Get-Item -LiteralPath $ilrepackTool).VersionInfo
          if (
            -not (Test-Path -LiteralPath $ilrepackTool -PathType Leaf) -or
            -not (Test-Path -LiteralPath $ilrepackRuntimeConfig -PathType Leaf) -or
            (Get-FileHash -LiteralPath $ilrepackTool -Algorithm SHA256).Hash.ToLowerInvariant() -cne $env:ILREPACK_TOOL_SHA256 -or
            (Get-FileHash -LiteralPath $ilrepackRuntimeConfig -Algorithm SHA256).Hash.ToLowerInvariant() -cne $env:ILREPACK_RUNTIMECONFIG_SHA256 -or
            $ilrepackVersionInfo.FileVersion -cne "2.0.24.0" -or
            $ilrepackVersionInfo.ProductVersion -cne "2.0.24+5b55fa2f4d7c7b18ffb104e2fade2f794f4ccedf"
          ) {
            throw "The reviewed ILRepack package lacks its exact deterministic tools."
          }

          $nugetConfig = Join-Path $env:RUNNER_TEMP "tokenmonster-squirrel-nuget.config"
          [IO.File]::WriteAllText(
            $nugetConfig,
            "<?xml version=`"1.0`" encoding=`"utf-8`"?>`n<configuration>`n  <packageSources>`n    <clear />`n    <add key=`"nuget.org`" value=`"$($env:NUGET_SOURCE)`" protocolVersion=`"3`" />`n  </packageSources>`n  <fallbackPackageFolders>`n    <clear />`n  </fallbackPackageFolders>`n</configuration>`n",
            [Text.UTF8Encoding]::new($false)
          )

          function Assert-IsolatedProjectAssets {
            param(
              [Parameter(Mandatory)] [string] $AssetsPath,
              [Parameter(Mandatory)] [string] $PackageRoot,
              [Parameter(Mandatory)] [string] $ConfigPath
            )

            if (-not (Test-Path -LiteralPath $AssetsPath -PathType Leaf)) {
              throw "The exact PackageReference restore did not produce $AssetsPath."
            }
            $assets = Get-Content -LiteralPath $AssetsPath -Raw | ConvertFrom-Json
            $packageFolders = @($assets.packageFolders.PSObject.Properties.Name)
            $sources = @($assets.project.restore.sources.PSObject.Properties.Name)
            $configFiles = @($assets.project.restore.configFilePaths)
            $expectedPackageRoot = [IO.Path]::TrimEndingDirectorySeparator(
              [IO.Path]::GetFullPath($PackageRoot)
            )
            $actualPackageRoot = if ($packageFolders.Count -eq 1) {
              [IO.Path]::TrimEndingDirectorySeparator(
                [IO.Path]::GetFullPath($packageFolders[0])
              )
            } else {
              ""
            }
            $unexpectedReferencePackages = @(
              $assets.libraries.PSObject.Properties.Name |
                Where-Object { $_ -match "^Microsoft\.NETFramework\.ReferenceAssemblies" }
            )
            if (
              $packageFolders.Count -ne 1 -or
              $actualPackageRoot -ine $expectedPackageRoot -or
              $sources.Count -ne 1 -or
              $sources[0] -cne $env:NUGET_SOURCE -or
              $configFiles.Count -ne 1 -or
              [IO.Path]::GetFullPath($configFiles[0]) -ine [IO.Path]::GetFullPath($ConfigPath) -or
              $unexpectedReferencePackages.Count -ne 0
            ) {
              throw "The PackageReference restore escaped its reviewed source, config, package root, or reference inputs."
            }
          }

          # NuGet 4.9 treats the literal value "clear" as a relative fallback
          # path here. Use an empty global property plus both implicit-folder
          # disable switches, then verify the generated assets fail-closed.
          $env:NUGET_RESTORE_MSBUILD_ARGS = @(
            "/p:DisableImplicitLibraryPacksFolder=true"
            "/p:DisableImplicitNuGetFallbackFolder=true"
            "/p:RestoreFallbackFolders="
            "/p:RestoreAdditionalProjectSources="
            "/p:RestoreAdditionalProjectFallbackFolders="
            "/p:AutomaticallyUseReferenceAssemblyPackages=false"
            "/p:TargetFrameworkRootPath=$referenceBuildRoot"
            "/p:DirectoryBuildTargetsPath=$referenceTargets"
          ) -join " "

          # This is the human-reviewed inventory from the first quarantined
          # byte-identical build. Each isolated restore must match it before
          # any package-provided targets are allowed into the compile.
          $reviewedDependencyInventory = @(
            "global/deltacompressiondotnet/1.1.0/deltacompressiondotnet.1.1.0.nupkg.sha512`t2lAyh3f9BvodfRmw8kKFxrWIKD6FcLdKv4dSHOfEgbkmNhOARFJ8TItyr76XsumEPJ53ORPLS3twRDIWnO4XnA=="
            "global/ilrepack/1.26.0/ilrepack.1.26.0.nupkg.sha512`t3Taj5hDZkDK8SlOVmoOkI0R6JpQAbCLEP3Rs1nbS3RhqjuKdsH1PvbNFTAtLMhsBNVnGahY3mJD8BmfZjnIj3Q=="
            "global/microsoft.build.tasks.git/1.0.0-beta2-18618-05/microsoft.build.tasks.git.1.0.0-beta2-18618-05.nupkg.sha512`tkcnqXhm6lxU8UFtpVO8enW7L8Gisw05bI46B3cWlW7K1dgGPb4hAyfiGyGczYOU6n4RtHO9CCfh0Lk74qkbF6w=="
            "global/microsoft.sourcelink.common/1.0.0-beta2-18618-05/microsoft.sourcelink.common.1.0.0-beta2-18618-05.nupkg.sha512`teJP4JUDOiiWPBvwN+/0v1otoT8VPFOm6upABUAS6TwFbLfjRiLI2Ko44gyxF0nW+uMQHx186tnTDt+fg7je97Q=="
            "global/microsoft.sourcelink.github/1.0.0-beta2-18618-05/microsoft.sourcelink.github.1.0.0-beta2-18618-05.nupkg.sha512`t7cQMyVdud/ritrYqgc99LecTC0g9rA2QhO1QFi6OBubsA++gMXRiXx/ct1rmycxM9EvHJSNZ9DHbZHu42RLMLQ=="
            "global/microsoft.web.xdt/2.1.1/microsoft.web.xdt.2.1.1.nupkg.sha512`t8aCgaay6cgnrSwSeIDCU0qG6gi5VdR/LZuHSyyNH/dmtOMq89nSYKEXiscvQNPTNm2CL7s9JRVU0Wl24f6p4kg=="
            "global/mono.cecil/0.11.2/mono.cecil.0.11.2.nupkg.sha512`tBTpKT6mzbvLgXKWSilfGOn0we1JeJb7VWu2f1lJ3ABJqCqoZlNCdi90BMiTJl+9DdJ5MqH3pokN873IjM3vi/Q=="
            "global/nerdbank.gitversioning/3.0.50/nerdbank.gitversioning.3.0.50.nupkg.sha512`tNiT6vLHcTP8VM244+rfmoVHuWh7bPsG9XnKMm4rAEc2QmPFGQfruUBaqxgbsqz4z7yuEZlhjP1UURdhfz04wXg=="
            "global/sharpcompress/0.17.1/sharpcompress.0.17.1.nupkg.sha512`twLRtmFrUhhF6ljyYCWWcwfGRZ9pX1gNZDSF6+Rj5uxS85Rq497HvhP7CYLNXCyIP1s065D3ebHcRA6uK1NFtcQ=="
            "global/wpfanimatedgif/1.4.15/wpfanimatedgif.1.4.15.nupkg.sha512`tzuh1qY8DkJOXM/SIMGDtfNMrIUiPsOzr9ZLWoxFqo2GQBoU7QuZpdQE/yQDxrZS3AuNx8gdX753BxT42xfJLbA=="
            "legacy/ilrepack.1.26.0/ilrepack.1.26.0.nupkg`tsha256:fe49fd5aa140c1f4e99b24fbe34311289a4ee97ab0989df2b9f4f5288fa95471"
            "legacy/microsoft.data.edm.5.6.1/microsoft.data.edm.5.6.1.nupkg`tsha256:2372dda0dbbc7c01a09883fbeb4ba245ac0913bce346795fd66f11db96945510"
            "legacy/microsoft.data.odata.5.6.1/microsoft.data.odata.5.6.1.nupkg`tsha256:82454bc4c599f79682130e30cd44cb6588dcd75661c3cbd637c9ae321ba84a8c"
            "legacy/microsoft.data.services.client.5.6.1/microsoft.data.services.client.5.6.1.nupkg`tsha256:a6405fb929a99739c3079024a4d1003dc1a4629ff6f40b95c454498d8e545ed8"
            "legacy/system.spatial.5.6.1/system.spatial.5.6.1.nupkg`tsha256:0d6efec3c6097edaa50d02cc713a0bc80d3a1441992081d21104831a7e4f4d06"
          )
          $reviewedMergeInputInventory = @(
            "Update.exe`tsha256:c7cd37af0958928bb362d33824847966ec2f1efa3a9fe43c39b0aa071ed77d12`tbytes:86528"
            "WpfAnimatedGif.dll`tsha256:ce8ef825fc10e5a3265bd3a4c418e7012ade1f61bbeb7ed9459c1311e4e6b917`tbytes:39936"
            "SharpCompress.dll`tsha256:21d9b05a5c703f6754b8fbd6e3d0d58fc6dd31215d1118af64d4305f7d92d585`tbytes:454144"
            "Microsoft.Web.XmlTransform.dll`tsha256:13dcf5066e00152238191314d4a46605204ffabdbb830bdd0c97df3027d1261d`tbytes:81600"
            "DeltaCompressionDotNet.dll`tsha256:13950b911243e13269ef2487a00147c824e2223a7fb9103eb21f765c795be45e`tbytes:4608"
            "DeltaCompressionDotNet.MsDelta.dll`tsha256:1ce872ed466a8a3466c808a7babf3b597ec12e1cb84870e7a0cf00b2f5ef6df4`tbytes:5632"
            "Squirrel.dll`tsha256:661fa2a994b92ae8b84509de200ad0b7274c25e0be542bfedc41ff37e98ed7a0`tbytes:267264"
            "NuGet.Squirrel.dll`tsha256:96e7297db309b556bfc56b0cbaf31546c7c954e7dac09b967ab31776c90120ca`tbytes:513536"
            "Mono.Cecil.dll`tsha256:7744c9c84c28033bc3606f4dfce2adcd6f632e2be7827893c3e2257100f1cf9e`tbytes:345088"
          )

          function Get-DependencyInventory {
            param(
              [Parameter(Mandatory)] [string] $GlobalPackages,
              [Parameter(Mandatory)] [string] $LegacyPackages
            )

            $globalInventory = @(
              Get-ChildItem -LiteralPath $GlobalPackages -Recurse -File -Filter "*.nupkg.sha512" |
                ForEach-Object {
                  $relative = [IO.Path]::GetRelativePath($GlobalPackages, $_.FullName).Replace("\", "/").ToLowerInvariant()
                  "$relative`t$((Get-Content -LiteralPath $_.FullName -Raw).Trim())"
                } |
                Sort-Object -CaseSensitive
            )
            $legacyInventory = @(
              Get-ChildItem -LiteralPath $LegacyPackages -Recurse -File -Filter "*.nupkg" |
                ForEach-Object {
                  $relative = [IO.Path]::GetRelativePath($LegacyPackages, $_.FullName).Replace("\", "/").ToLowerInvariant()
                  $hash = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
                  "legacy/$relative`tsha256:$hash"
                } |
                Sort-Object -CaseSensitive
            )
            return @(
              $globalInventory | ForEach-Object { "global/$_" }
              $legacyInventory
            )
          }

          $outputs = @()
          $dependencyInventories = @()
          $mergeInputInventories = @()
          foreach ($sourceName in @("squirrel-a", "squirrel-b")) {
            $source = Join-Path $env:GITHUB_WORKSPACE $sourceName
            $dependencyCache = Join-Path $env:RUNNER_TEMP "$sourceName-nuget-packages"
            $httpCache = Join-Path $env:RUNNER_TEMP "$sourceName-nuget-http-cache"
            $scratch = Join-Path $env:RUNNER_TEMP "$sourceName-nuget-scratch"
            if (
              (Test-Path -LiteralPath $dependencyCache) -or
              (Test-Path -LiteralPath $httpCache) -or
              (Test-Path -LiteralPath $scratch)
            ) {
              throw "The isolated NuGet dependency state must start absent."
            }
            New-Item -ItemType Directory -Path $dependencyCache | Out-Null
            New-Item -ItemType Directory -Path $httpCache | Out-Null
            New-Item -ItemType Directory -Path $scratch | Out-Null
            # Keep the global-package root canonical for both NuGet 4.9 and
            # PackageReference-generated MSBuild inputs.
            $nugetPackageRoot = $dependencyCache + [IO.Path]::DirectorySeparatorChar
            $env:NUGET_PACKAGES = $nugetPackageRoot
            $env:NUGET_HTTP_CACHE_PATH = $httpCache
            $env:NUGET_SCRATCH = $scratch
            $env:TEMP = $scratch
            $env:TMP = $scratch
            $env:NUGET_CREDENTIALPROVIDERS_PATH = ""
            $env:NUGET_PLUGIN_PATHS = ""

            $legacyPackages = Join-Path $source "packages"
            & $nuget restore (Join-Path $source "vendor/nuget/src/Core/packages.config") -PackagesDirectory $legacyPackages -NonInteractive -NoCache -DirectDownload -ConfigFile $nugetConfig -Source $env:NUGET_SOURCE
            if ($LASTEXITCODE -ne 0) {
              throw "The exact upstream legacy Core dependency restore failed."
            }
            & $nuget restore (Join-Path $source "src/Squirrel/Squirrel.csproj") -PackagesDirectory $nugetPackageRoot -NonInteractive -NoCache -DirectDownload -ConfigFile $nugetConfig -Source $env:NUGET_SOURCE -MSBuildPath (Split-Path -Parent $msbuild)
            if ($LASTEXITCODE -ne 0) {
              throw "The exact upstream Squirrel library dependency restore failed."
            }
            Assert-IsolatedProjectAssets -AssetsPath (Join-Path $source "build/obj/Squirrel/project.assets.json") -PackageRoot $nugetPackageRoot -ConfigPath $nugetConfig
            & $nuget restore (Join-Path $source "src/Update/Update.csproj") -PackagesDirectory $nugetPackageRoot -NonInteractive -NoCache -DirectDownload -ConfigFile $nugetConfig -Source $env:NUGET_SOURCE -MSBuildPath (Split-Path -Parent $msbuild)
            if ($LASTEXITCODE -ne 0) {
              throw "The exact upstream updater dependency restore failed."
            }
            Assert-IsolatedProjectAssets -AssetsPath (Join-Path $source "build/obj/Update/project.assets.json") -PackageRoot $nugetPackageRoot -ConfigPath $nugetConfig

            $inventory = @(
              Get-DependencyInventory -GlobalPackages $dependencyCache -LegacyPackages $legacyPackages
            )
            $dependencyDifferences = @(
              Compare-Object $reviewedDependencyInventory $inventory -CaseSensitive
            )
            if ($inventory.Count -lt 1 -or $dependencyDifferences.Count -ne 0) {
              Write-Output "Resolved dependency inventory for rejected $sourceName restore:"
              $inventory | ForEach-Object { Write-Output $_ }
              throw "The upstream restore does not match the committed reviewed dependency inventory."
            }
            $dependencyInventories += ,$inventory

            # Core.csproj predates SourceRoot items. Disable MSBuild's inferred
            # source mapping and supply the same explicit compiler PathMap for
            # both otherwise independent source trees. Symbols are neither
            # merged nor shipped, so do not embed a path-sensitive PDB identity.
            $buildArguments = @(
              "/p:Configuration=Release"
              "/p:Platform=Any CPU"
              "/p:TargetFrameworkRootPath=$referenceBuildRoot"
              "/p:DirectoryBuildTargetsPath=$referenceTargets"
              "/p:NuGetPackageRoot=$nugetPackageRoot"
              "/p:DisableImplicitLibraryPacksFolder=true"
              "/p:DisableImplicitNuGetFallbackFolder=true"
              "/p:RestoreFallbackFolders="
              "/p:RestoreAdditionalProjectSources="
              "/p:RestoreAdditionalProjectFallbackFolders="
              "/p:AutomaticallyUseReferenceAssemblyPackages=false"
              "/p:Deterministic=true"
              "/p:ContinuousIntegrationBuild=true"
              "/p:DeterministicSourcePaths=false"
              "/p:PathMap=$source=/_/squirrel"
              "/p:DebugSymbols=false"
              "/p:DebugType=None"
              "/p:PostBuildEvent="
              "/m:1"
              "/nr:false"
              "/v:minimal"
            )
            & $msbuild (Join-Path $source "src/Update/Update.csproj") @buildArguments
            if ($LASTEXITCODE -ne 0) {
              throw "The exact upstream updater build failed."
            }

            $outputDirectory = Join-Path $source "build/Release/net45"
            $mergeInputNames = @(
              "Update.exe"
              "WpfAnimatedGif.dll"
              "SharpCompress.dll"
              "Microsoft.Web.XmlTransform.dll"
              "DeltaCompressionDotNet.dll"
              "DeltaCompressionDotNet.MsDelta.dll"
              "Squirrel.dll"
              "NuGet.Squirrel.dll"
              "Mono.Cecil.dll"
            )
            $mergeInputInventory = @(
              $mergeInputNames | ForEach-Object {
                $inputPath = Join-Path $outputDirectory $_
                if (-not (Test-Path -LiteralPath $inputPath -PathType Leaf)) {
                  throw "The exact upstream build did not produce merge input $_."
                }
                $inputHash = (
                  Get-FileHash -LiteralPath $inputPath -Algorithm SHA256
                ).Hash.ToLowerInvariant()
                "$_`tsha256:$inputHash`tbytes:$((Get-Item -LiteralPath $inputPath).Length)"
              }
            )
            Write-Output "Reviewed pre-merge input inventory for $sourceName (fixed public filenames only):"
            $mergeInputInventory | ForEach-Object { Write-Output $_ }
            $mergeInputReceiptDifferences = @(
              Compare-Object $reviewedMergeInputInventory $mergeInputInventory -CaseSensitive
            )
            if ($mergeInputReceiptDifferences.Count -ne 0) {
              throw "The compiler outputs do not match the committed reviewed merge-input inventory."
            }
            $mergeInputInventories += ,$mergeInputInventory

            $mergedTemporaryOutput = Join-Path $outputDirectory "Update.exe.tmp"
            if (Test-Path -LiteralPath $mergedTemporaryOutput) {
              throw "The deterministic merge output path must start absent."
            }
            $mergeExitCode = $null
            Push-Location $outputDirectory
            try {
              & dotnet exec --fx-version $env:ILREPACK_RUNTIME_VERSION --roll-forward Disable $ilrepackTool "/ndebug" "/internalize" "/out:Update.exe.tmp" @mergeInputNames
              $mergeExitCode = $LASTEXITCODE
            } finally {
              Pop-Location
            }
            if ($mergeExitCode -ne 0 -or -not (Test-Path -LiteralPath $mergedTemporaryOutput -PathType Leaf)) {
              throw "The reviewed deterministic ILRepack merge failed."
            }
            $output = Join-Path $outputDirectory "Update.exe"
            Move-Item -LiteralPath $mergedTemporaryOutput -Destination $output -Force
            $outputs += $output
          }

          if (Compare-Object $dependencyInventories[0] $dependencyInventories[1] -CaseSensitive) {
            throw "The two isolated restores resolved different dependency content hashes."
          }
          $mergeInputDifferences = @(
            Compare-Object $mergeInputInventories[0] $mergeInputInventories[1] -CaseSensitive
          )
          if ($mergeInputDifferences.Count -ne 0) {
            throw "The two isolated compilers produced different deterministic merge inputs."
          }
          $hashes = @(
            $outputs | ForEach-Object {
              (Get-FileHash -LiteralPath $_ -Algorithm SHA256).Hash.ToLowerInvariant()
            }
          )
          $sizes = @($outputs | ForEach-Object { (Get-Item -LiteralPath $_).Length })
          if (
            $hashes.Count -ne 2 -or
            $hashes[0] -cne $hashes[1] -or
            $hashes[0] -ceq $env:BROKEN_UPDATER_SHA256 -or
            $hashes[0] -cne $env:REVIEWED_UPDATER_SHA256 -or
            $sizes[0] -ne $sizes[1] -or
            $sizes[0] -ne [int64]$env:REVIEWED_UPDATER_BYTES -or
            $sizes[0] -lt 1 -or
            $sizes[0] -gt 10485760
          ) {
            throw "The two isolated updater builds were not identical reviewed outputs."
          }
          $signature = Get-AuthenticodeSignature -LiteralPath $outputs[0]
          if ($signature.Status -cne "NotSigned") {
            throw "The reviewed source build unexpectedly produced a signed updater."
          }

          $artifactDirectory = Join-Path $env:RUNNER_TEMP "reviewed-squirrel-updater"
          if (Test-Path -LiteralPath $artifactDirectory) {
            throw "The reviewed updater artifact directory must start absent."
          }
          New-Item -ItemType Directory -Path $artifactDirectory | Out-Null
          $artifactBinary = Join-Path $artifactDirectory "Squirrel.exe"
          Copy-Item -LiteralPath $outputs[0] -Destination $artifactBinary
          if (
            (Get-FileHash -LiteralPath $artifactBinary -Algorithm SHA256).Hash.ToLowerInvariant() -cne $hashes[0] -or
            (Get-Item -LiteralPath $artifactBinary).Length -ne $sizes[0]
          ) {
            throw "The staged updater artifact no longer matches the reviewed output."
          }
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "squirrel-a/COPYING") -Destination (Join-Path $artifactDirectory "SQUIRREL-WINDOWS-LICENSE.txt")
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "squirrel-a/vendor/nuget/LICENSE.txt") -Destination (Join-Path $artifactDirectory "NUGET-SUBMODULE-LICENSE.txt")
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "squirrel-a/vendor/nuget/COPYRIGHT.txt") -Destination (Join-Path $artifactDirectory "NUGET-SUBMODULE-COPYRIGHT.txt")
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "squirrel-a/vendor/nuget/CREDITS.txt") -Destination (Join-Path $artifactDirectory "NUGET-SUBMODULE-CREDITS.txt")
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "ilrepack-source/LICENSE") -Destination (Join-Path $artifactDirectory "ILREPACK-LICENSE.txt")
          $dependencyInventoryPath = Join-Path $artifactDirectory "nuget-content-hashes.txt"
          [IO.File]::WriteAllLines($dependencyInventoryPath, $dependencyInventories[0], [Text.UTF8Encoding]::new($false))
          $dependencyInventorySha256 = (Get-FileHash -LiteralPath $dependencyInventoryPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $mergeInputInventoryPath = Join-Path $artifactDirectory "merge-input-hashes.txt"
          [IO.File]::WriteAllLines($mergeInputInventoryPath, $mergeInputInventories[0], [Text.UTF8Encoding]::new($false))
          $mergeInputInventorySha256 = (Get-FileHash -LiteralPath $mergeInputInventoryPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if (
            $dependencyInventorySha256 -cne $env:REVIEWED_DEPENDENCY_INVENTORY_SHA256 -or
            $mergeInputInventorySha256 -cne $env:REVIEWED_MERGE_INPUT_INVENTORY_SHA256
          ) {
            throw "The staged review inventories do not match their committed receipts."
          }
          $dotnetInfoPath = Join-Path $artifactDirectory "dotnet-info.txt"
          [IO.File]::WriteAllLines($dotnetInfoPath, $dotnetInfo, [Text.UTF8Encoding]::new($false))
          $dotnetInfoSha256 = (Get-FileHash -LiteralPath $dotnetInfoPath -Algorithm SHA256).Hash.ToLowerInvariant()

          $versionInfo = (Get-Item -LiteralPath $outputs[0]).VersionInfo
          $provenance = [ordered]@{
            contractVersion = 1
            candidateOnly = $true
            workflowRepository = $env:GITHUB_REPOSITORY
            workflowCommit = $env:GITHUB_SHA
            workflowRunId = $env:GITHUB_RUN_ID
            workflowRunAttempt = $env:GITHUB_RUN_ATTEMPT
            sourceRepository = "https://github.com/Squirrel/Squirrel.Windows"
            sourceBaseCommit = $env:SOURCE_BASE_COMMIT
            fixCommit = $env:FIX_COMMIT
            fixTree = $env:FIX_TREE
            upstreamMergeCommit = $env:UPSTREAM_MERGE_COMMIT
            nugetSubmoduleCommit = $env:NUGET_SUBMODULE_COMMIT
            runnerImage = $env:ImageOS
            runnerImageVersion = $env:ImageVersion
            msbuildVersion = $msbuildVersion
            dotnetInfoSha256 = $dotnetInfoSha256
            nugetVersion = $nugetVersion
            nugetSha256 = $nugetSha256
            referenceAssembliesVersion = "1.0.3"
            referenceAssembliesSha256 = $referencePackageSha256
            mergeTool = "ILRepack"
            mergeToolVersion = "2.0.24"
            mergeToolSourceCommit = $env:ILREPACK_SOURCE_COMMIT
            mergeToolSourceTree = $env:ILREPACK_SOURCE_TREE
            mergeToolReleaseTagCommit = $env:ILREPACK_RELEASE_TAG_COMMIT
            mergeToolPackageSha256 = $ilrepackPackageSha256
            mergeToolExecutableSha256 = $env:ILREPACK_TOOL_SHA256
            mergeToolRuntimeConfigSha256 = $env:ILREPACK_RUNTIMECONFIG_SHA256
            mergeToolRuntime = "Microsoft.NETCore.App $($env:ILREPACK_RUNTIME_VERSION) selected with dotnet exec --fx-version and --roll-forward Disable"
            mergeArguments = @(
              "/ndebug"
              "/internalize"
              "/out:Update.exe.tmp"
              "Update.exe"
              "WpfAnimatedGif.dll"
              "SharpCompress.dll"
              "Microsoft.Web.XmlTransform.dll"
              "DeltaCompressionDotNet.dll"
              "DeltaCompressionDotNet.MsDelta.dll"
              "Squirrel.dll"
              "NuGet.Squirrel.dll"
              "Mono.Cecil.dll"
            )
            upstreamDeclaredMergeTool = "ILRepack 1.26.0 restored but not executed; PostBuildEvent is disabled"
            dependencyInventorySha256 = $dependencyInventorySha256
            reviewedDependencyInventorySha256 = $env:REVIEWED_DEPENDENCY_INVENTORY_SHA256
            mergeInputInventorySha256 = $mergeInputInventorySha256
            reviewedMergeInputInventorySha256 = $env:REVIEWED_MERGE_INPUT_INVENTORY_SHA256
            compilerDeterministic = $true
            compilerPathMap = "source checkout root => /_/squirrel"
            compilerDebugSymbols = $false
            compilerDebugType = "None"
            binaryBytes = $sizes[0]
            binarySha256 = $hashes[0]
            reviewedBinaryBytes = [int64]$env:REVIEWED_UPDATER_BYTES
            reviewedBinarySha256 = $env:REVIEWED_UPDATER_SHA256
            productVersion = $versionInfo.ProductVersion
            fileVersion = $versionInfo.FileVersion
            repeatability = "same-job byte equality across two path-mapped source trees, isolated NuGet caches, deterministic compiler inputs, and the reviewed deterministic merge tool"
          }
          $provenancePath = Join-Path $artifactDirectory "provenance.json"
          [IO.File]::WriteAllText(
            $provenancePath,
            (($provenance | ConvertTo-Json -Depth 4) + "`n"),
            [Text.UTF8Encoding]::new($false)
          )
          "binary-sha256=$($hashes[0])" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "binary-bytes=$($sizes[0])" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Output "Rebuilt identical reviewed Squirrel updater bytes twice: SHA-256 $($hashes[0]), $($sizes[0]) bytes."

      - name: Upload reviewed updater and provenance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reviewed-squirrel-updater-${{ steps.build.outputs.binary-sha256 }}
          path: ${{ runner.temp }}/reviewed-squirrel-updater/
          if-no-files-found: error
          retention-days: 7
