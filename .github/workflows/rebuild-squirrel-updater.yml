          )

          function Get-GlobalDependencyInventory {
            param(
              [Parameter(Mandatory)] [string] $GlobalPackages
            )

            return @(
              Get-ChildItem -LiteralPath $GlobalPackages -Recurse -File -Filter "*.nupkg.sha512" |
                ForEach-Object {
                  $relative = [IO.Path]::GetRelativePath($GlobalPackages, $_.FullName).Replace("\", "/").ToLowerInvariant()
                  "global/$relative`t$((Get-Content -LiteralPath $_.FullName -Raw).Trim())"
                } |
                Sort-Object -CaseSensitive
            )
          }

          function Get-DependencyInventory {
            param(
              [Parameter(Mandatory)] [string] $GlobalPackages,
              [Parameter(Mandatory)] [string] $LegacyPackages
            )

            $globalInventory = @(
              Get-GlobalDependencyInventory -GlobalPackages $GlobalPackages
            )
            $legacyInventory = @(
              Get-ChildItem -LiteralPath $LegacyPackages -Recurse -File -Filter "*.nupkg" |
                ForEach-Object {
                  $relative = [IO.Path]::GetRelativePath($LegacyPackages, $_.FullName).Replace("\", "/").ToLowerInvariant()
                  $hash = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
                  "legacy/$relative`tsha256:$hash"
                } |
                Sort-Object -CaseSensitive
            )
            return @(
              $globalInventory
              $legacyInventory
            )
          }

          $outputs = @()
          $dependencyInventories = @()
          $testDependencyInventories = @()
          $mergeInputInventories = @()
          $sourceTestPassCount = 0
          foreach ($sourceName in @("squirrel-a", "squirrel-b")) {
            $source = Join-Path $env:GITHUB_WORKSPACE $sourceName
            $dependencyCache = Join-Path $env:RUNNER_TEMP "$sourceName-nuget-packages"
            $httpCache = Join-Path $env:RUNNER_TEMP "$sourceName-nuget-http-cache"
            $scratch = Join-Path $env:RUNNER_TEMP "$sourceName-nuget-scratch"
            if (
              (Test-Path -LiteralPath $dependencyCache) -or
              (Test-Path -LiteralPath $httpCache) -or
              (Test-Path -LiteralPath $scratch)
            ) {
              throw "The isolated NuGet dependency state must start absent."
            }
            New-Item -ItemType Directory -Path $dependencyCache | Out-Null
            New-Item -ItemType Directory -Path $httpCache | Out-Null
            New-Item -ItemType Directory -Path $scratch | Out-Null
            # Keep the global-package root canonical for both NuGet 4.9 and
            # PackageReference-generated MSBuild inputs.
            $nugetPackageRoot = $dependencyCache + [IO.Path]::DirectorySeparatorChar
            $env:NUGET_PACKAGES = $nugetPackageRoot
            $env:NUGET_HTTP_CACHE_PATH = $httpCache
            $env:NUGET_SCRATCH = $scratch
            $env:TEMP = $scratch
            $env:TMP = $scratch
            $env:NUGET_CREDENTIALPROVIDERS_PATH = ""
            $env:NUGET_PLUGIN_PATHS = ""

            $legacyPackages = Join-Path $source "packages"
            & $nuget restore (Join-Path $source "vendor/nuget/src/Core/packages.config") -PackagesDirectory $legacyPackages -NonInteractive -NoCache -DirectDownload -ConfigFile $nugetConfig -Source $env:NUGET_SOURCE
            if ($LASTEXITCODE -ne 0) {
              throw "The exact upstream legacy Core dependency restore failed."
            }
            & $nuget restore (Join-Path $source "src/Squirrel/Squirrel.csproj") -PackagesDirectory $nugetPackageRoot -NonInteractive -NoCache -DirectDownload -ConfigFile $nugetConfig -Source $env:NUGET_SOURCE -MSBuildPath (Split-Path -Parent $msbuild)
            if ($LASTEXITCODE -ne 0) {
              throw "The exact upstream Squirrel library dependency restore failed."
            }
            $squirrelAssetsPath = Join-Path $source "build/obj/Squirrel/project.assets.json"
            Assert-IsolatedProjectAssets -AssetsPath $squirrelAssetsPath -PackageRoot $nugetPackageRoot -ConfigPath $nugetConfig
            Assert-XdtProjectAssets -AssetsPath $squirrelAssetsPath

            $globalXdtRoot = Join-Path $dependencyCache "microsoft.web.xdt/3.1.0"
            $legacyXdtRoot = Join-Path $legacyPackages "Microsoft.Web.Xdt.3.1.0"
            Assert-XdtPackage -Path (Join-Path $globalXdtRoot "microsoft.web.xdt.3.1.0.nupkg")
            Assert-XdtPackage -Path (Join-Path $legacyXdtRoot "Microsoft.Web.Xdt.3.1.0.nupkg")
            Assert-XdtAssembly -Path (Join-Path $globalXdtRoot "lib/net40/Microsoft.Web.XmlTransform.dll")
            Assert-XdtAssembly -Path (Join-Path $legacyXdtRoot "lib/net40/Microsoft.Web.XmlTransform.dll")

            & $nuget restore (Join-Path $source "src/Update/Update.csproj") -PackagesDirectory $nugetPackageRoot -NonInteractive -NoCache -DirectDownload -ConfigFile $nugetConfig -Source $env:NUGET_SOURCE -MSBuildPath (Split-Path -Parent $msbuild)
            if ($LASTEXITCODE -ne 0) {
              throw "The exact upstream updater dependency restore failed."
            }
            Assert-IsolatedProjectAssets -AssetsPath (Join-Path $source "build/obj/Update/project.assets.json") -PackageRoot $nugetPackageRoot -ConfigPath $nugetConfig

            $inventory = @(
              Get-DependencyInventory -GlobalPackages $dependencyCache -LegacyPackages $legacyPackages
            )
            $dependencyDifferences = @(
              Compare-Object $reviewedDependencyInventory $inventory -CaseSensitive
            )
            if ($inventory.Count -lt 1 -or $dependencyDifferences.Count -ne 0) {
              Write-Output "Resolved dependency inventory for rejected $sourceName restore:"
              $inventory | ForEach-Object { Write-Output $_ }
              throw "The upstream restore does not match the committed reviewed dependency inventory."
            }
            $dependencyInventories += ,$inventory

            # Core.csproj predates SourceRoot items. Disable MSBuild's inferred
            # source mapping and supply the same explicit compiler PathMap for
            # both otherwise independent source trees. Symbols are neither
            # merged nor shipped, so do not embed a path-sensitive PDB identity.
            $buildArguments = @(
              "/p:Configuration=Release"
              "/p:Platform=Any CPU"
              "/p:TargetFrameworkRootPath=$referenceBuildRoot"
              "/p:DirectoryBuildTargetsPath=$referenceTargets"
              "/p:NuGetPackageRoot=$nugetPackageRoot"
              "/p:DisableImplicitLibraryPacksFolder=true"
              "/p:DisableImplicitNuGetFallbackFolder=true"
              "/p:RestoreFallbackFolders="
              "/p:RestoreAdditionalProjectSources="
              "/p:RestoreAdditionalProjectFallbackFolders="
              "/p:AutomaticallyUseReferenceAssemblyPackages=false"
              "/p:Deterministic=true"
              "/p:ContinuousIntegrationBuild=true"
              "/p:DeterministicSourcePaths=false"
              "/p:PathMap=$source=/_/squirrel"
              "/p:DebugSymbols=false"
              "/p:DebugType=None"
              "/p:PostBuildEvent="
              "/m:1"
              "/nr:false"
              "/v:minimal"
            )
            & $msbuild (Join-Path $source "src/Update/Update.csproj") @buildArguments
            if ($LASTEXITCODE -ne 0) {
              throw "The exact upstream updater build failed."
            }

            $outputDirectory = Join-Path $source "build/Release/net45"
            Assert-XdtAssembly -Path (Join-Path $outputDirectory "Microsoft.Web.XmlTransform.dll")
            $mergeInputNames = @(
              "Update.exe"
              "WpfAnimatedGif.dll"
              "SharpCompress.dll"
              "Microsoft.Web.XmlTransform.dll"
              "DeltaCompressionDotNet.dll"
              "DeltaCompressionDotNet.MsDelta.dll"
              "Squirrel.dll"
              "NuGet.Squirrel.dll"
              "Mono.Cecil.dll"
            )
            $mergeInputInventory = @(
              $mergeInputNames | ForEach-Object {
                $inputPath = Join-Path $outputDirectory $_
                if (-not (Test-Path -LiteralPath $inputPath -PathType Leaf)) {
                  throw "The exact upstream build did not produce merge input $_."
                }
                $inputHash = (
                  Get-FileHash -LiteralPath $inputPath -Algorithm SHA256
                ).Hash.ToLowerInvariant()
                "$_`tsha256:$inputHash`tbytes:$((Get-Item -LiteralPath $inputPath).Length)"
              }
            )
            foreach ($mergeInputName in $mergeInputNames) {
              $metadataReceipt = Get-ManagedMetadataReceipt -Path (Join-Path $outputDirectory $mergeInputName)
              $xdtReferences = @(
                $metadataReceipt.AssemblyReferences |
                  Where-Object { $_.Name -ieq "Microsoft.Web.XmlTransform" }
              )
              if ($mergeInputName -ceq "NuGet.Squirrel.dll") {
                if (
                  $xdtReferences.Count -ne 1 -or
                  $xdtReferences[0].Name -cne "Microsoft.Web.XmlTransform" -or
                  $xdtReferences[0].Version -cne $env:XDT_ASSEMBLY_VERSION -or
                  $xdtReferences[0].PublicKeyToken -cne $env:XDT_PUBLIC_KEY_TOKEN
                ) {
                  throw "NuGet.Squirrel.dll does not contain the exact reviewed Microsoft.Web.Xdt reference."
                }
              } elseif ($xdtReferences.Count -ne 0) {
                throw "An unexpected merge input contains a Microsoft.Web.Xdt reference."
              }
            }
            Write-Output "Reviewed pre-merge input inventory for $sourceName (fixed public filenames only):"
            $mergeInputInventory | ForEach-Object { Write-Output $_ }
            $mergeInputReceiptDifferences = @(
              Compare-Object $reviewedMergeInputInventory $mergeInputInventory -CaseSensitive
            )
            if (-not $deriveCandidate -and $mergeInputReceiptDifferences.Count -ne 0) {
              throw "The compiler outputs do not match the committed reviewed merge-input inventory."
            }
            $mergeInputInventories += ,$mergeInputInventory

            $mergedTemporaryOutput = Join-Path $outputDirectory "Update.exe.tmp"
            if (Test-Path -LiteralPath $mergedTemporaryOutput) {
              throw "The deterministic merge output path must start absent."
            }
            $mergeExitCode = $null
            Push-Location $outputDirectory
            try {
              & dotnet exec --fx-version $env:ILREPACK_RUNTIME_VERSION --roll-forward Disable $ilrepackTool "/ndebug" "/internalize" "/out:Update.exe.tmp" @mergeInputNames
              $mergeExitCode = $LASTEXITCODE
            } finally {
              Pop-Location
            }
            if ($mergeExitCode -ne 0 -or -not (Test-Path -LiteralPath $mergedTemporaryOutput -PathType Leaf)) {
              throw "The reviewed deterministic ILRepack merge failed."
            }
            $output = Join-Path $outputDirectory "Update.exe"
            Move-Item -LiteralPath $mergedTemporaryOutput -Destination $output -Force
            $mergedMetadataReceipt = Get-ManagedMetadataReceipt -Path $output
            $mergedXdtReferences = @(
              $mergedMetadataReceipt.AssemblyReferences |
                Where-Object { $_.Name -ieq "Microsoft.Web.XmlTransform" }
            )
            $expectedMergedXdtTypes = @(
              "Microsoft.Web.XmlTransform.XmlTransformation"
              "Microsoft.Web.XmlTransform.XmlTransformableDocument"
            )
            $mergedXdtTypes = @(
              $mergedMetadataReceipt.TypeDefinitions |
                Where-Object { $expectedMergedXdtTypes -ccontains $_ }
            )
            $mergedTypeDifferences = @(
              Compare-Object $expectedMergedXdtTypes $mergedXdtTypes -CaseSensitive
            )
            if (
              $mergedXdtReferences.Count -ne 0 -or
              $mergedXdtTypes.Count -ne 2 -or
              $mergedTypeDifferences.Count -ne 0
            ) {
              throw "The merged updater did not internalize the exact reviewed Microsoft.Web.Xdt types."
            }

            $testDependencyCache = Join-Path $env:RUNNER_TEMP "$sourceName-test-nuget-packages"
            $testHttpCache = Join-Path $env:RUNNER_TEMP "$sourceName-test-nuget-http-cache"
            $testScratch = Join-Path $env:RUNNER_TEMP "$sourceName-test-nuget-scratch"
            $testResults = Join-Path $env:RUNNER_TEMP "$sourceName-source-test-results"
            if (
              (Test-Path -LiteralPath $testDependencyCache) -or
              (Test-Path -LiteralPath $testHttpCache) -or
              (Test-Path -LiteralPath $testScratch) -or
              (Test-Path -LiteralPath $testResults)
            ) {
              throw "The isolated source-test dependency state must start absent."
            }
            New-Item -ItemType Directory -Path $testDependencyCache | Out-Null
            New-Item -ItemType Directory -Path $testHttpCache | Out-Null
            New-Item -ItemType Directory -Path $testScratch | Out-Null
            New-Item -ItemType Directory -Path $testResults | Out-Null
            $testNugetPackageRoot = $testDependencyCache + [IO.Path]::DirectorySeparatorChar
            $env:NUGET_PACKAGES = $testNugetPackageRoot
            $env:NUGET_HTTP_CACHE_PATH = $testHttpCache
            $env:NUGET_SCRATCH = $testScratch
            $env:TEMP = $testScratch
            $env:TMP = $testScratch

            $testProject = Join-Path $source "test/Squirrel.Tests.csproj"
            & $nuget restore $testProject -PackagesDirectory $testNugetPackageRoot -NonInteractive -NoCache -DirectDownload -ConfigFile $nugetConfig -Source $env:NUGET_SOURCE -MSBuildPath (Split-Path -Parent $msbuild)
            if ($LASTEXITCODE -ne 0) {
              throw "The exact upstream source-test dependency restore failed."
            }
            $testAssetsPath = Join-Path $source "test/obj/project.assets.json"
            Assert-IsolatedProjectAssets -AssetsPath $testAssetsPath -PackageRoot $testNugetPackageRoot -ConfigPath $nugetConfig
            $testInventory = @(
              Get-GlobalDependencyInventory -GlobalPackages $testDependencyCache
            )
            $testInventoryDifferences = @(
              Compare-Object $reviewedTestDependencyInventory $testInventory -CaseSensitive
            )
            if ($testInventory.Count -lt 1 -or $testInventoryDifferences.Count -ne 0) {
              Write-Output "Resolved dependency inventory for rejected $sourceName source-test restore:"
              $testInventory | ForEach-Object { Write-Output $_ }
              throw "The source-test restore does not match the committed reviewed dependency inventory."
            }
            $testDependencyInventories += ,$testInventory

            $testBuildArguments = @(
              $buildArguments |
                Where-Object {
                  $_ -notmatch "^/p:(?:NuGetPackageRoot|PathMap|DebugSymbols|DebugType)="
                }
            )
            $testBuildArguments += "/p:NuGetPackageRoot=$testNugetPackageRoot"
            $testBuildArguments += "/p:BuildProjectReferences=false"
            # This upstream test helper locates fixtures from StackFrame source
            # paths, so the unshipped test assembly intentionally keeps a full
            # PDB and does not use the release artifact PathMap.
            $testBuildArguments += "/p:PathMap="
            $testBuildArguments += "/p:DebugSymbols=true"
            $testBuildArguments += "/p:DebugType=full"
            & $msbuild $testProject @testBuildArguments
            if ($LASTEXITCODE -ne 0) {
              throw "The reviewed source-test assembly build failed."
            }
            $testAssembly = Join-Path $source "test/bin/Any CPU/Release/net45/Squirrel.Tests.dll"
            $testAssemblyFile = Get-Item -LiteralPath $testAssembly -Force
            $testSymbols = Join-Path $source "test/bin/Any CPU/Release/net45/Squirrel.Tests.pdb"
            $testSymbolsFile = Get-Item -LiteralPath $testSymbols -Force
            if (
              $testAssemblyFile.PSIsContainer -or
              ($testAssemblyFile.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0 -or
              $testAssemblyFile.Length -lt 1 -or
              $testSymbolsFile.PSIsContainer -or
              ($testSymbolsFile.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0 -or
              $testSymbolsFile.Length -lt 1
            ) {
              throw "The reviewed source-test build did not produce a physical assembly and full PDB."
            }
            $sourceTestReceipt = Join-Path $testResults "reviewed-source-tests.txt"
            $sourceTestRunnerFile = Get-Item -LiteralPath $sourceTestRunner -Force
            $sourceTestRunnerSha256 = (
              Get-FileHash -LiteralPath $sourceTestRunnerFile.FullName -Algorithm SHA256
            ).Hash.ToLowerInvariant()
            if (
              $sourceTestRunnerFile.PSIsContainer -or
              ($sourceTestRunnerFile.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0 -or
              $sourceTestRunnerFile.Length -ne [int64]$env:SOURCE_TEST_RUNNER_BYTES -or
              $sourceTestRunnerSha256 -cne $env:SOURCE_TEST_RUNNER_SHA256
            ) {
              throw "The reviewed Squirrel source-test runner changed before execution."
            }
            & $windowsPowerShell -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File $sourceTestRunnerFile.FullName -AssemblyPath $testAssemblyFile.FullName -ReceiptPath $sourceTestReceipt
            if ($LASTEXITCODE -ne 0) {
              throw "The reviewed bounded-delete and PE-reopen source tests failed."
            }
            $sourceTestReceiptFile = Get-Item -LiteralPath $sourceTestReceipt -Force
            if (
              $sourceTestReceiptFile.PSIsContainer -or
              ($sourceTestReceiptFile.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0
            ) {
              throw "The reviewed source-test runner did not produce a physical receipt."
            }
            $expectedSourceTestReceipt = @(
              "passed`tSquirrel.Tests.Core.UtilityTests.DeleteDirectoryOrJustGiveUpRetriesTransientFileLocks"
              "passed`tSquirrel.Tests.Core.UtilityTests.DeleteDirectoryOrJustGiveUpReturnsAfterBoundedRetriesForPermanentFileLocks"
              "passed`tSquirrel.Tests.SquirrelAwareExecutableDetectorTests.NotSquirrelAware"
            )
            $sourceTestReceiptLines = @(
              Get-Content -LiteralPath $sourceTestReceiptFile.FullName -Encoding UTF8
            )
            $sourceTestReceiptMatches = $sourceTestReceiptLines.Count -eq 3
            for ($sourceTestIndex = 0; $sourceTestIndex -lt 3; $sourceTestIndex++) {
              if (
                $sourceTestReceiptLines.Count -le $sourceTestIndex -or
                $sourceTestReceiptLines[$sourceTestIndex] -cne $expectedSourceTestReceipt[$sourceTestIndex]
              ) {
                $sourceTestReceiptMatches = $false
              }
            }
            if (-not $sourceTestReceiptMatches) {
              throw "The reviewed source-test result set was incomplete."
            }
            $sourceTestPassCount += $sourceTestReceiptLines.Count
            $outputs += $output
          }

          if (Compare-Object $dependencyInventories[0] $dependencyInventories[1] -CaseSensitive) {
            throw "The two isolated restores resolved different dependency content hashes."
          }
          if (
            $sourceTestPassCount -ne 6 -or
            (Compare-Object $testDependencyInventories[0] $testDependencyInventories[1] -CaseSensitive)
          ) {
            throw "The two isolated source-test runs were not identical successful validations."
          }
          $mergeInputDifferences = @(
            Compare-Object $mergeInputInventories[0] $mergeInputInventories[1] -CaseSensitive
          )
          if ($mergeInputDifferences.Count -ne 0) {
            throw "The two isolated compilers produced different deterministic merge inputs."
          }
          $hashes = @(
            $outputs | ForEach-Object {
              (Get-FileHash -LiteralPath $_ -Algorithm SHA256).Hash.ToLowerInvariant()
            }
          )
          $sizes = @($outputs | ForEach-Object { (Get-Item -LiteralPath $_).Length })
          $invalidRepeatedOutput = (
            $hashes.Count -ne 2 -or
            $hashes[0] -cne $hashes[1] -or
            $hashes[0] -ceq $env:BROKEN_UPDATER_SHA256 -or
            $sizes[0] -ne $sizes[1] -or
            $sizes[0] -lt 1 -or
            $sizes[0] -gt 10485760
          )
          $invalidLockedOutput = (
            -not $deriveCandidate -and (
              $hashes[0] -cne $env:REVIEWED_UPDATER_SHA256 -or
              $sizes[0] -ne [int64]$env:REVIEWED_UPDATER_BYTES
            )
          )
          if ($invalidRepeatedOutput -or $invalidLockedOutput) {
            throw "The two isolated updater builds were not identical outputs for the selected receipt mode."
          }
          $signature = Get-AuthenticodeSignature -LiteralPath $outputs[0]
          if ($signature.Status -cne "NotSigned") {
            throw "The reviewed source build unexpectedly produced a signed updater."
          }
          Assert-MergedXdtBehavior -Path $outputs[0]

          $artifactDirectory = Join-Path $env:RUNNER_TEMP "squirrel-updater-candidate"
          if (Test-Path -LiteralPath $artifactDirectory) {
            throw "The updater candidate artifact directory must start absent."
          }
          New-Item -ItemType Directory -Path $artifactDirectory | Out-Null
          $artifactBinary = Join-Path $artifactDirectory "Squirrel.exe"
          Copy-Item -LiteralPath $outputs[0] -Destination $artifactBinary
          if (
            (Get-FileHash -LiteralPath $artifactBinary -Algorithm SHA256).Hash.ToLowerInvariant() -cne $hashes[0] -or
            (Get-Item -LiteralPath $artifactBinary).Length -ne $sizes[0]
          ) {
            throw "The staged updater artifact no longer matches the reviewed output."
          }
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "squirrel-a/COPYING") -Destination (Join-Path $artifactDirectory "SQUIRREL-WINDOWS-LICENSE.txt")
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "squirrel-a/vendor/nuget/LICENSE.txt") -Destination (Join-Path $artifactDirectory "NUGET-SUBMODULE-LICENSE.txt")
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "squirrel-a/vendor/nuget/COPYRIGHT.txt") -Destination (Join-Path $artifactDirectory "NUGET-SUBMODULE-COPYRIGHT.txt")
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "squirrel-a/vendor/nuget/CREDITS.txt") -Destination (Join-Path $artifactDirectory "NUGET-SUBMODULE-CREDITS.txt")
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "ilrepack-source/LICENSE") -Destination (Join-Path $artifactDirectory "ILREPACK-LICENSE.txt")
          $xdtLicensePath = Join-Path $artifactDirectory "MICROSOFT-WEB-XDT-LICENSE.txt"
          $xdtSourceLicensePath = Join-Path $env:GITHUB_WORKSPACE "xdt-source/LICENSE.txt"
          $xdtLicenseText = [IO.File]::ReadAllText($xdtSourceLicensePath)
          $xdtLicenseText = $xdtLicenseText.Replace("`r`n", "`n")
          $xdtLicenseText = $xdtLicenseText.Replace("`r", "`n")
          [IO.File]::WriteAllText(
            $xdtLicensePath,
            $xdtLicenseText,
            [Text.UTF8Encoding]::new($false)
          )
          $xdtAttributionPath = Join-Path $artifactDirectory "MICROSOFT-WEB-XDT-ATTRIBUTION.txt"
          $xdtAttribution = @(
            "Microsoft.Web.Xdt 3.1.0"
            ""
            "Copyright © Microsoft Corporation. All rights reserved."
            "Licensed under Apache-2.0. See MICROSOFT-WEB-XDT-LICENSE.txt."
            ""
            "Package: https://www.nuget.org/packages/Microsoft.Web.Xdt/3.1.0"
            "Source: https://github.com/dotnet/xdt"
            "Source commit: 5b67dee04d86740575f0f5022b79833213cc024a"
            ""
            "The exact source tree contains LICENSE.txt and no NOTICE file. This attribution"
            "file is generated by TokenMonster for its redistribution bundle; it is not an"
            "upstream NOTICE file."
          ) -join "`n"
          [IO.File]::WriteAllText(
            $xdtAttributionPath,
            ($xdtAttribution + "`n"),
            [Text.UTF8Encoding]::new($false)
          )
          if (
            (Get-FileHash -LiteralPath $xdtLicensePath -Algorithm SHA256).Hash.ToLowerInvariant() -cne $env:XDT_LICENSE_SHA256 -or
            (Get-FileHash -LiteralPath $xdtAttributionPath -Algorithm SHA256).Hash.ToLowerInvariant() -cne $env:XDT_ATTRIBUTION_SHA256 -or
            (Get-Item -LiteralPath $xdtAttributionPath).Length -ne [int64]$env:XDT_ATTRIBUTION_BYTES
          ) {
            throw "The staged Microsoft.Web.Xdt license bundle does not match its reviewed contract."
          }
          $dependencyInventoryPath = Join-Path $artifactDirectory "nuget-content-hashes.txt"
          [IO.File]::WriteAllLines($dependencyInventoryPath, $dependencyInventories[0], [Text.UTF8Encoding]::new($false))
          $dependencyInventorySha256 = (Get-FileHash -LiteralPath $dependencyInventoryPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $testDependencyInventoryPath = Join-Path $artifactDirectory "source-test-nuget-content-hashes.txt"
          [IO.File]::WriteAllLines($testDependencyInventoryPath, $testDependencyInventories[0], [Text.UTF8Encoding]::new($false))
          $testDependencyInventorySha256 = (Get-FileHash -LiteralPath $testDependencyInventoryPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $mergeInputInventoryPath = Join-Path $artifactDirectory "merge-input-hashes.txt"
          [IO.File]::WriteAllLines($mergeInputInventoryPath, $mergeInputInventories[0], [Text.UTF8Encoding]::new($false))
          $mergeInputInventorySha256 = (Get-FileHash -LiteralPath $mergeInputInventoryPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if (
            $dependencyInventorySha256 -cne $env:REVIEWED_DEPENDENCY_INVENTORY_SHA256 -or
            (
              -not $deriveCandidate -and
              $testDependencyInventorySha256 -cne $env:REVIEWED_TEST_DEPENDENCY_INVENTORY_SHA256
            ) -or
            (
              -not $deriveCandidate -and
              $mergeInputInventorySha256 -cne $env:REVIEWED_MERGE_INPUT_INVENTORY_SHA256
            )
          ) {
            throw "The staged review inventories do not match their committed receipts."
          }
          $dotnetInfoPath = Join-Path $artifactDirectory "dotnet-info.txt"
          [IO.File]::WriteAllLines($dotnetInfoPath, $dotnetInfo, [Text.UTF8Encoding]::new($false))
          $dotnetInfoSha256 = (Get-FileHash -LiteralPath $dotnetInfoPath -Algorithm SHA256).Hash.ToLowerInvariant()

          $versionInfo = (Get-Item -LiteralPath $outputs[0]).VersionInfo
          $lockedMergeInputInventorySha256 = if ($deriveCandidate) {
            $null
          } else {
            $env:REVIEWED_MERGE_INPUT_INVENTORY_SHA256
          }
          $lockedTestDependencyInventorySha256 = if ($deriveCandidate) {
            $null
          } else {
            $env:REVIEWED_TEST_DEPENDENCY_INVENTORY_SHA256
          }
          $lockedBinaryBytes = if ($deriveCandidate) {
            $null
          } else {
            [int64]$env:REVIEWED_UPDATER_BYTES
          }
          $lockedBinarySha256 = if ($deriveCandidate) {
            $null
          } else {
            $env:REVIEWED_UPDATER_SHA256
          }
          $provenance = [ordered]@{
            contractVersion = 1
            candidateOnly = $true
            receiptMode = $receiptMode
            workflowRepository = $env:GITHUB_REPOSITORY
            workflowCommit = $env:TOKENMONSTER_POLICY_SHA
            triggerCommit = $env:GITHUB_SHA
            workflowRunId = $env:GITHUB_RUN_ID
            workflowRunAttempt = $env:GITHUB_RUN_ATTEMPT
            sourceRepository = "https://github.com/Squirrel/Squirrel.Windows"
            sourceBaseCommit = $env:SOURCE_BASE_COMMIT
            fixCommit = $env:FIX_COMMIT
            fixTree = $env:FIX_TREE
            upstreamMergeCommit = $env:UPSTREAM_MERGE_COMMIT
            nugetSubmoduleCommit = $env:NUGET_SUBMODULE_COMMIT
            boundedDeletePatchSha256 = $env:RETRY_PATCH_SHA256
            boundedDeletePatchBytes = [int64]$env:RETRY_PATCH_BYTES
            xdtOuterPatchSha256 = $env:XDT_OUTER_PATCH_SHA256
            xdtOuterPatchBytes = [int64]$env:XDT_OUTER_PATCH_BYTES
            xdtInnerPatchSha256 = $env:XDT_INNER_PATCH_SHA256
            xdtInnerPatchBytes = [int64]$env:XDT_INNER_PATCH_BYTES
            xdtPackageVersion = "3.1.0"
            xdtSourceCommit = $env:XDT_SOURCE_COMMIT
            xdtSourceTree = $env:XDT_SOURCE_TREE
            xdtLicenseBlob = $env:XDT_LICENSE_BLOB
            xdtLicenseSha256 = $env:XDT_LICENSE_SHA256
            xdtAttributionSha256 = $env:XDT_ATTRIBUTION_SHA256
            xdtPackageSha256 = $env:XDT_PACKAGE_SHA256
            xdtPackageBytes = [int64]$env:XDT_PACKAGE_BYTES
            xdtAssemblySha256 = $env:XDT_DLL_SHA256
            xdtAssemblyBytes = [int64]$env:XDT_DLL_BYTES
            xdtAssemblyVersion = $env:XDT_ASSEMBLY_VERSION
            xdtAssemblyPublicKeyToken = $env:XDT_PUBLIC_KEY_TOKEN
            xdtAssemblyMvid = $env:XDT_MVID
            xdtSelectedAsset = "lib/net40/Microsoft.Web.XmlTransform.dll"
            xdtRestorePathsVerified = @("global", "legacy")
            xdtPreMergeReferenceScan = "exactly NuGet.Squirrel.dll => Microsoft.Web.XmlTransform 3.1.0.0, token 31bf3856ad364e35"
            xdtMergedExternalReferenceCount = 0
            xdtMergedTypesVerified = @(
              "Microsoft.Web.XmlTransform.XmlTransformation"
              "Microsoft.Web.XmlTransform.XmlTransformableDocument"
            )
            xdtBehaviorSmoke = "Replace, InsertIfMissing, Remove, and malformed-transform rejection passed"
            xdtUpstreamNoticePresent = $false
            runnerImage = $env:ImageOS
            runnerImageVersion = $env:ImageVersion
            msbuildVersion = $msbuildVersion
            dotnetInfoSha256 = $dotnetInfoSha256
            nugetVersion = $nugetVersion
            nugetSha256 = $nugetSha256
            referenceAssembliesVersion = "1.0.3"
            referenceAssembliesSha256 = $referencePackageSha256
            mergeTool = "ILRepack"
            mergeToolVersion = "2.0.24"
            mergeToolSourceCommit = $env:ILREPACK_SOURCE_COMMIT
            mergeToolSourceTree = $env:ILREPACK_SOURCE_TREE
            mergeToolReleaseTagCommit = $env:ILREPACK_RELEASE_TAG_COMMIT
            mergeToolPackageSha256 = $ilrepackPackageSha256
            mergeToolExecutableSha256 = $env:ILREPACK_TOOL_SHA256
            mergeToolRuntimeConfigSha256 = $env:ILREPACK_RUNTIMECONFIG_SHA256
            mergeToolRuntime = "Microsoft.NETCore.App $($env:ILREPACK_RUNTIME_VERSION) selected with dotnet exec --fx-version and --roll-forward Disable"
            mergeArguments = @(
              "/ndebug"
              "/internalize"
              "/out:Update.exe.tmp"
              "Update.exe"
              "WpfAnimatedGif.dll"
              "SharpCompress.dll"
              "Microsoft.Web.XmlTransform.dll"
              "DeltaCompressionDotNet.dll"
              "DeltaCompressionDotNet.MsDelta.dll"
              "Squirrel.dll"
              "NuGet.Squirrel.dll"
              "Mono.Cecil.dll"
            )
            upstreamDeclaredMergeTool = "ILRepack 1.26.0 restored but not executed; PostBuildEvent is disabled"
            dependencyInventorySha256 = $dependencyInventorySha256
            reviewedDependencyInventorySha256 = $env:REVIEWED_DEPENDENCY_INVENTORY_SHA256
            sourceTestDependencyInventorySha256 = $testDependencyInventorySha256
            reviewedSourceTestDependencyInventorySha256 = $lockedTestDependencyInventorySha256
            sourceTestRunnerSha256 = $env:SOURCE_TEST_RUNNER_SHA256
            sourceTestRunnerBytes = [int64]$env:SOURCE_TEST_RUNNER_BYTES
            sourceTestExecution = "Windows PowerShell 5.1 reflection runner; exact public instance Fact methods only; async Tasks awaited"
            sourceTests = @(
              "Squirrel.Tests.Core.UtilityTests.DeleteDirectoryOrJustGiveUpRetriesTransientFileLocks"
              "Squirrel.Tests.Core.UtilityTests.DeleteDirectoryOrJustGiveUpReturnsAfterBoundedRetriesForPermanentFileLocks"
              "Squirrel.Tests.SquirrelAwareExecutableDetectorTests.NotSquirrelAware"
            )
            sourceTestExecutionsPassed = $sourceTestPassCount
            mergeInputInventorySha256 = $mergeInputInventorySha256
            reviewedMergeInputInventorySha256 = $lockedMergeInputInventorySha256
            compilerDeterministic = $true
            compilerPathMap = "source checkout root => /_/squirrel"
            compilerDebugSymbols = $false
            compilerDebugType = "None"
            binaryBytes = $sizes[0]
            binarySha256 = $hashes[0]
            reviewedBinaryBytes = $lockedBinaryBytes
            reviewedBinarySha256 = $lockedBinarySha256
            productVersion = $versionInfo.ProductVersion
            fileVersion = $versionInfo.FileVersion
            repeatability = "same-job byte equality across two path-mapped source trees, isolated NuGet caches, deterministic compiler inputs, and the reviewed deterministic merge tool"
          }
          $provenancePath = Join-Path $artifactDirectory "provenance.json"
          [IO.File]::WriteAllText(
            $provenancePath,
            (($provenance | ConvertTo-Json -Depth 4) + "`n"),
            [Text.UTF8Encoding]::new($false)
          )
          "receipt-mode=$receiptMode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "binary-sha256=$($hashes[0])" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "binary-bytes=$($sizes[0])" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Output "Rebuilt identical $receiptMode Squirrel updater candidate bytes twice: SHA-256 $($hashes[0]), $($sizes[0]) bytes."

      - name: Upload updater candidate and provenance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: squirrel-updater-${{ steps.build.outputs.receipt-mode }}-${{ steps.build.outputs.binary-sha256 }}
          path: ${{ runner.temp }}/squirrel-updater-candidate/
          if-no-files-found: error
          retention-days: 7
