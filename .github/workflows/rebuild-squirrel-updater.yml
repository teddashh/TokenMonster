name: Rebuild reviewed Squirrel updater

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rebuild-reviewed-updater:
    name: Rebuild reviewed Squirrel updater twice
    runs-on: windows-2022
    timeout-minutes: 25

    steps:
      - name: Check out exact upstream source A
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Squirrel/Squirrel.Windows
          ref: eef37460aef77b2f9de8cd2237c1e55b344a6554
          path: squirrel-a
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Check out exact upstream source B
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Squirrel/Squirrel.Windows
          ref: eef37460aef77b2f9de8cd2237c1e55b344a6554
          path: squirrel-b
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Verify exact upstream identities and one-file fix
        shell: pwsh
        env:
          SOURCE_TAG_OBJECT: 274f7a9a5dc211552f27d1da7dc7899546a52be3
          SOURCE_BASE_COMMIT: eef37460aef77b2f9de8cd2237c1e55b344a6554
          SOURCE_BASE_DETECTOR_BLOB: 0fdefda329abf979a2c739f02761e3d4ec8e30de
          FIX_COMMIT: c98244936f6876b080366417301268058028a53c
          FIX_TREE: 0a1ebfa90cea6f8037907134d53562a26c6bb4c3
          FIX_DETECTOR_BLOB: e8e442e0d95c5b7f5cc31a2eb84cf9407f5be2ab
          UPSTREAM_MERGE_COMMIT: 45834cbfeae84d20ef2bed24ac863f02d0abec66
          NUGET_SUBMODULE_COMMIT: 50f8d9e438fe948d7109501bd10f6024d0585b70
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          foreach ($sourceName in @("squirrel-a", "squirrel-b")) {
            $source = Join-Path $env:GITHUB_WORKSPACE $sourceName
            $head = (git -C $source rev-parse HEAD).Trim()
            $tagObject = (git -C $source rev-parse "refs/tags/2.0.1").Trim()
            $tagCommit = (git -C $source rev-parse "refs/tags/2.0.1^{}").Trim()
            $baseDetectorBlob = (
              git -C $source rev-parse "$($env:SOURCE_BASE_COMMIT):src/Squirrel/SquirrelAwareExecutableDetector.cs"
            ).Trim()
            $nugetLink = (
              git -C $source rev-parse "$($env:SOURCE_BASE_COMMIT):vendor/nuget"
            ).Trim()
            $nugetHead = (git -C (Join-Path $source "vendor/nuget") rev-parse HEAD).Trim()
            $persistedCredentials = @(
              git -C $source config --local --get-regexp "^http\..*\.extraheader$" 2>$null
            )
            $fixParent = (git -C $source rev-parse "$($env:FIX_COMMIT)^").Trim()
            $fixTree = (git -C $source rev-parse "$($env:FIX_COMMIT)^{tree}").Trim()
            $fixDetectorBlob = (
              git -C $source rev-parse "$($env:FIX_COMMIT):src/Squirrel/SquirrelAwareExecutableDetector.cs"
            ).Trim()
            $fixChangedFiles = @(
              git -C $source diff-tree --no-commit-id --name-only -r $env:FIX_COMMIT
            )
            $mergeFixParent = (git -C $source rev-parse "$($env:UPSTREAM_MERGE_COMMIT)^2").Trim()
            $mergeDetectorBlob = (
              git -C $source rev-parse "$($env:UPSTREAM_MERGE_COMMIT):src/Squirrel/SquirrelAwareExecutableDetector.cs"
            ).Trim()
            $dirty = @(git -C $source status --porcelain --untracked-files=no)

            if (
              $head -cne $env:SOURCE_BASE_COMMIT -or
              $tagObject -cne $env:SOURCE_TAG_OBJECT -or
              $tagCommit -cne $env:SOURCE_BASE_COMMIT -or
              $baseDetectorBlob -cne $env:SOURCE_BASE_DETECTOR_BLOB -or
              $nugetLink -cne $env:NUGET_SUBMODULE_COMMIT -or
              $nugetHead -cne $env:NUGET_SUBMODULE_COMMIT -or
              $persistedCredentials.Count -ne 0 -or
              $fixParent -cne $env:SOURCE_BASE_COMMIT -or
              $fixTree -cne $env:FIX_TREE -or
              $fixDetectorBlob -cne $env:FIX_DETECTOR_BLOB -or
              $fixChangedFiles.Count -ne 1 -or
              $fixChangedFiles[0] -cne "src/Squirrel/SquirrelAwareExecutableDetector.cs" -or
              $mergeFixParent -cne $env:FIX_COMMIT -or
              $mergeDetectorBlob -cne $env:FIX_DETECTOR_BLOB -or
              $dirty.Count -ne 0
            ) {
              throw "The upstream graph is not the exact 2.0.1 base and merged one-file fix."
            }

            git -C $source checkout $env:FIX_COMMIT -- "src/Squirrel/SquirrelAwareExecutableDetector.cs"
            if ($LASTEXITCODE -ne 0) {
              throw "The reviewed Squirrel fix could not be reconstructed."
            }
            $changedFiles = @(git -C $source diff --cached --name-only)
            $reconstructedBlob = (
              git -C $source rev-parse ":src/Squirrel/SquirrelAwareExecutableDetector.cs"
            ).Trim()
            $reconstructedTree = (git -C $source write-tree).Trim()
            if (
              $changedFiles.Count -ne 1 -or
              $changedFiles[0] -cne "src/Squirrel/SquirrelAwareExecutableDetector.cs" -or
              $reconstructedBlob -cne $env:FIX_DETECTOR_BLOB -or
              $reconstructedTree -cne $env:FIX_TREE
            ) {
              throw "The reconstructed source is not the upstream-merged one-file fix."
            }

            git -C $source reset --hard $env:FIX_COMMIT
            if ($LASTEXITCODE -ne 0) {
              throw "The reconstructed source could not be bound to the exact fix commit."
            }
            $boundHead = (git -C $source rev-parse HEAD).Trim()
            $boundDirty = @(git -C $source status --porcelain --untracked-files=no)
            if ($boundHead -cne $env:FIX_COMMIT -or $boundDirty.Count -ne 0) {
              throw "The source tree was not cleanly bound to the exact fix commit."
            }
          }

      - name: Build twice with isolated dependency caches
        id: build
        shell: pwsh
        env:
          BROKEN_UPDATER_SHA256: 76359cd4b0349a83337b941332ad042c90351c2bb0a4628307740324c97984cc
          NUGET_URL: https://dist.nuget.org/win-x86-commandline/v4.9.4/nuget.exe
          NUGET_SHA256: cb139d855d06d07e7da892e8558fe16dcaa65cb381175c506f5ed0a759eaf8f6
          NUGET_SOURCE: https://api.nuget.org/v3/index.json
          REFERENCE_ASSEMBLIES_URL: https://api.nuget.org/v3-flatcontainer/microsoft.netframework.referenceassemblies.net45/1.0.3/microsoft.netframework.referenceassemblies.net45.1.0.3.nupkg
          REFERENCE_ASSEMBLIES_SHA256: 23a9f94ea3e2cb88cd8341af75b811c6fb5cb82516fc696e95ed4620279128e3
          SOURCE_BASE_COMMIT: eef37460aef77b2f9de8cd2237c1e55b344a6554
          FIX_COMMIT: c98244936f6876b080366417301268058028a53c
          FIX_TREE: 0a1ebfa90cea6f8037907134d53562a26c6bb4c3
          UPSTREAM_MERGE_COMMIT: 45834cbfeae84d20ef2bed24ac863f02d0abec66
          NUGET_SUBMODULE_COMMIT: 50f8d9e438fe948d7109501bd10f6024d0585b70
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio/Installer/vswhere.exe"
          if (-not (Test-Path -LiteralPath $vswhere -PathType Leaf)) {
            throw "The reviewed Windows runner lacks vswhere.exe."
          }
          $msbuildCandidates = @(
            & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe"
          )
          if ($msbuildCandidates.Count -ne 1) {
            throw "The reviewed Windows runner did not resolve exactly one MSBuild executable."
          }
          $msbuild = $msbuildCandidates[0]
          $msbuildVersion = (& $msbuild -version -nologo | Select-Object -Last 1).Trim()
          if ($LASTEXITCODE -ne 0 -or [String]::IsNullOrWhiteSpace($msbuildVersion)) {
            throw "MSBuild did not report a version."
          }
          $dotnetInfo = @(& dotnet --info)
          if ($LASTEXITCODE -ne 0 -or $dotnetInfo.Count -lt 1) {
            throw "The reviewed Windows runner did not report its .NET SDK inventory."
          }

          foreach ($credentialVariable in @(
            "ACTIONS_ID_TOKEN_REQUEST_TOKEN",
            "ACTIONS_RUNTIME_TOKEN",
            "GH_TOKEN",
            "GITHUB_TOKEN",
            "NODE_AUTH_TOKEN",
            "NUGET_AUTH_TOKEN",
            "SYSTEM_ACCESSTOKEN"
          )) {
            Remove-Item "Env:$credentialVariable" -ErrorAction SilentlyContinue
          }

          $nuget = Join-Path $env:RUNNER_TEMP "nuget-4.9.4.exe"
          if (Test-Path -LiteralPath $nuget) {
            throw "The exact NuGet bootstrap path must start absent."
          }
          Invoke-WebRequest -Uri $env:NUGET_URL -OutFile $nuget -MaximumRedirection 0
          $nugetFile = Get-Item -LiteralPath $nuget
          $nugetSha256 = (Get-FileHash -LiteralPath $nuget -Algorithm SHA256).Hash.ToLowerInvariant()
          $nugetSignature = Get-AuthenticodeSignature -LiteralPath $nuget
          if (
            $nugetFile.Length -ne 5690456 -or
            $nugetSha256 -cne $env:NUGET_SHA256 -or
            $nugetFile.VersionInfo.FileVersion -cne "4.9.4.5839" -or
            $nugetFile.VersionInfo.ProductVersion -cne "4.9.4+ed6e2dca9391d13b431f4eff58c5194f0ebcee13" -or
            $nugetSignature.Status -cne "Valid" -or
            $nugetSignature.SignerCertificate.Thumbprint -cne "9DC17888B5CFAD98B3CB35C1994E96227F061675" -or
            $nugetSignature.SignerCertificate.Subject -notmatch "(?:^|, )O=Microsoft Corporation(?:,|$)"
          ) {
            throw "The downloaded NuGet 4.9.4 bootstrap is not the reviewed Microsoft binary."
          }
          $nugetVersion = $nugetFile.VersionInfo.FileVersion

          $referencePackage = Join-Path $env:RUNNER_TEMP "microsoft.netframework.referenceassemblies.net45.1.0.3.nupkg"
          $referenceRoot = Join-Path $env:RUNNER_TEMP "net45-reference-assemblies"
          if (
            (Test-Path -LiteralPath $referencePackage) -or
            (Test-Path -LiteralPath $referenceRoot)
          ) {
            throw "The exact .NET Framework reference-assembly paths must start absent."
          }
          Invoke-WebRequest -Uri $env:REFERENCE_ASSEMBLIES_URL -OutFile $referencePackage -MaximumRedirection 0
          $referencePackageFile = Get-Item -LiteralPath $referencePackage
          $referencePackageSha256 = (Get-FileHash -LiteralPath $referencePackage -Algorithm SHA256).Hash.ToLowerInvariant()
          if (
            $referencePackageFile.Length -ne 19820444 -or
            $referencePackageSha256 -cne $env:REFERENCE_ASSEMBLIES_SHA256
          ) {
            throw "The .NET Framework 4.5 reference-assembly package is not the reviewed NuGet binary."
          }
          & $nuget verify -Signatures $referencePackage
          if ($LASTEXITCODE -ne 0) {
            throw "The exact .NET Framework reference-assembly NuGet signature is invalid."
          }
          New-Item -ItemType Directory -Path $referenceRoot | Out-Null
          [IO.Compression.ZipFile]::ExtractToDirectory($referencePackage, $referenceRoot)
          $referenceBuildRoot = Join-Path $referenceRoot "build"
          $referenceMscorlib = Join-Path $referenceBuildRoot ".NETFramework/v4.5/mscorlib.dll"
          $referenceTargets = Join-Path $referenceBuildRoot "Microsoft.NETFramework.ReferenceAssemblies.net45.targets"
          if (
            -not (Test-Path -LiteralPath $referenceMscorlib -PathType Leaf) -or
            -not (Test-Path -LiteralPath $referenceTargets -PathType Leaf)
          ) {
            throw "The reviewed reference-assembly package lacks its exact net45 build inputs."
          }

          $nugetConfig = Join-Path $env:RUNNER_TEMP "tokenmonster-squirrel-nuget.config"
          [IO.File]::WriteAllText(
            $nugetConfig,
            "<?xml version=`"1.0`" encoding=`"utf-8`"?>`n<configuration>`n  <packageSources>`n    <clear />`n    <add key=`"nuget.org`" value=`"$($env:NUGET_SOURCE)`" protocolVersion=`"3`" />`n  </packageSources>`n  <fallbackPackageFolders>`n    <clear />`n  </fallbackPackageFolders>`n</configuration>`n",
            [Text.UTF8Encoding]::new($false)
          )

          $outputs = @()
          $dependencyInventories = @()
          foreach ($sourceName in @("squirrel-a", "squirrel-b")) {
            $source = Join-Path $env:GITHUB_WORKSPACE $sourceName
            $dependencyCache = Join-Path $env:RUNNER_TEMP "$sourceName-nuget-packages"
            $httpCache = Join-Path $env:RUNNER_TEMP "$sourceName-nuget-http-cache"
            $scratch = Join-Path $env:RUNNER_TEMP "$sourceName-nuget-scratch"
            if (
              (Test-Path -LiteralPath $dependencyCache) -or
              (Test-Path -LiteralPath $httpCache) -or
              (Test-Path -LiteralPath $scratch)
            ) {
              throw "The isolated NuGet dependency state must start absent."
            }
            New-Item -ItemType Directory -Path $dependencyCache | Out-Null
            New-Item -ItemType Directory -Path $httpCache | Out-Null
            New-Item -ItemType Directory -Path $scratch | Out-Null
            $env:NUGET_PACKAGES = $dependencyCache
            $env:NUGET_HTTP_CACHE_PATH = $httpCache
            $env:NUGET_SCRATCH = $scratch
            $env:NUGET_CREDENTIALPROVIDERS_PATH = ""
            $env:NUGET_PLUGIN_PATHS = ""

            $legacyPackages = Join-Path $source "packages"
            & $nuget restore (Join-Path $source "vendor/nuget/src/Core/packages.config") -PackagesDirectory $legacyPackages -NonInteractive -NoCache -DirectDownload -ConfigFile $nugetConfig -Source $env:NUGET_SOURCE
            if ($LASTEXITCODE -ne 0) {
              throw "The exact upstream legacy Core dependency restore failed."
            }
            & $nuget restore (Join-Path $source "src/Squirrel/Squirrel.csproj") -NonInteractive -NoCache -DirectDownload -ConfigFile $nugetConfig -Source $env:NUGET_SOURCE -MSBuildPath (Split-Path -Parent $msbuild)
            if ($LASTEXITCODE -ne 0) {
              throw "The exact upstream Squirrel library dependency restore failed."
            }
            & $nuget restore (Join-Path $source "src/Update/Update.csproj") -NonInteractive -NoCache -DirectDownload -ConfigFile $nugetConfig -Source $env:NUGET_SOURCE -MSBuildPath (Split-Path -Parent $msbuild)
            if ($LASTEXITCODE -ne 0) {
              throw "The exact upstream updater dependency restore failed."
            }
            & $msbuild (Join-Path $source "src/Update/Update.csproj") "/p:Configuration=Release" "/p:Platform=Any CPU" "/p:TargetFrameworkRootPath=$referenceBuildRoot" "/p:DirectoryBuildTargetsPath=$referenceTargets" "/m:1" "/nr:false" "/v:minimal"
            if ($LASTEXITCODE -ne 0) {
              throw "The exact upstream updater build failed."
            }

            $output = Join-Path $source "build/Release/net45/Update.exe"
            if (-not (Test-Path -LiteralPath $output -PathType Leaf)) {
              throw "The exact upstream build did not produce Update.exe."
            }
            $outputs += $output

            $globalInventory = @(
              Get-ChildItem -LiteralPath $dependencyCache -Recurse -File -Filter "*.nupkg.sha512" |
                ForEach-Object {
                  $relative = [IO.Path]::GetRelativePath($dependencyCache, $_.FullName).Replace("\", "/").ToLowerInvariant()
                  "$relative`t$((Get-Content -LiteralPath $_.FullName -Raw).Trim())"
                } |
                Sort-Object -CaseSensitive
            )
            $legacyInventory = @()
            if (Test-Path -LiteralPath $legacyPackages -PathType Container) {
              $legacyInventory = @(
                Get-ChildItem -LiteralPath $legacyPackages -Recurse -File -Filter "*.nupkg" |
                  ForEach-Object {
                    $relative = [IO.Path]::GetRelativePath($legacyPackages, $_.FullName).Replace("\", "/").ToLowerInvariant()
                    $hash = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
                    "legacy/$relative`tsha256:$hash"
                  } |
                  Sort-Object -CaseSensitive
              )
            }
            $inventory = @(
              $globalInventory | ForEach-Object { "global/$_" }
              $legacyInventory
            )
            if ($inventory.Count -lt 1) {
              throw "The upstream dependency restore produced no content-hash inventory."
            }
            $dependencyInventories += ,$inventory
          }

          if (Compare-Object $dependencyInventories[0] $dependencyInventories[1] -CaseSensitive) {
            throw "The two isolated restores resolved different dependency content hashes."
          }
          $hashes = @(
            $outputs | ForEach-Object {
              (Get-FileHash -LiteralPath $_ -Algorithm SHA256).Hash.ToLowerInvariant()
            }
          )
          $sizes = @($outputs | ForEach-Object { (Get-Item -LiteralPath $_).Length })
          if (
            $hashes.Count -ne 2 -or
            $hashes[0] -cne $hashes[1] -or
            $hashes[0] -ceq $env:BROKEN_UPDATER_SHA256 -or
            $sizes[0] -ne $sizes[1] -or
            $sizes[0] -lt 1 -or
            $sizes[0] -gt 10485760
          ) {
            throw "The two isolated updater builds were not identical reviewed outputs."
          }
          $signature = Get-AuthenticodeSignature -LiteralPath $outputs[0]
          if ($signature.Status -cne "NotSigned") {
            throw "The reviewed source build unexpectedly produced a signed updater."
          }

          $artifactDirectory = Join-Path $env:RUNNER_TEMP "reviewed-squirrel-updater"
          if (Test-Path -LiteralPath $artifactDirectory) {
            throw "The reviewed updater artifact directory must start absent."
          }
          New-Item -ItemType Directory -Path $artifactDirectory | Out-Null
          Copy-Item -LiteralPath $outputs[0] -Destination (Join-Path $artifactDirectory "Squirrel.exe")
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "squirrel-a/COPYING") -Destination (Join-Path $artifactDirectory "SQUIRREL-WINDOWS-LICENSE.txt")
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "squirrel-a/vendor/nuget/LICENSE.txt") -Destination (Join-Path $artifactDirectory "NUGET-SUBMODULE-LICENSE.txt")
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "squirrel-a/vendor/nuget/COPYRIGHT.txt") -Destination (Join-Path $artifactDirectory "NUGET-SUBMODULE-COPYRIGHT.txt")
          Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE "squirrel-a/vendor/nuget/CREDITS.txt") -Destination (Join-Path $artifactDirectory "NUGET-SUBMODULE-CREDITS.txt")
          $dependencyInventoryPath = Join-Path $artifactDirectory "nuget-content-hashes.txt"
          [IO.File]::WriteAllLines($dependencyInventoryPath, $dependencyInventories[0], [Text.UTF8Encoding]::new($false))
          $dependencyInventorySha256 = (Get-FileHash -LiteralPath $dependencyInventoryPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $dotnetInfoPath = Join-Path $artifactDirectory "dotnet-info.txt"
          [IO.File]::WriteAllLines($dotnetInfoPath, $dotnetInfo, [Text.UTF8Encoding]::new($false))
          $dotnetInfoSha256 = (Get-FileHash -LiteralPath $dotnetInfoPath -Algorithm SHA256).Hash.ToLowerInvariant()

          $versionInfo = (Get-Item -LiteralPath $outputs[0]).VersionInfo
          $provenance = [ordered]@{
            contractVersion = 1
            candidateOnly = $true
            workflowRepository = $env:GITHUB_REPOSITORY
            workflowCommit = $env:GITHUB_SHA
            workflowRunId = $env:GITHUB_RUN_ID
            workflowRunAttempt = $env:GITHUB_RUN_ATTEMPT
            sourceRepository = "https://github.com/Squirrel/Squirrel.Windows"
            sourceBaseCommit = $env:SOURCE_BASE_COMMIT
            fixCommit = $env:FIX_COMMIT
            fixTree = $env:FIX_TREE
            upstreamMergeCommit = $env:UPSTREAM_MERGE_COMMIT
            nugetSubmoduleCommit = $env:NUGET_SUBMODULE_COMMIT
            runnerImage = $env:ImageOS
            runnerImageVersion = $env:ImageVersion
            msbuildVersion = $msbuildVersion
            dotnetInfoSha256 = $dotnetInfoSha256
            nugetVersion = $nugetVersion
            nugetSha256 = $nugetSha256
            referenceAssembliesVersion = "1.0.3"
            referenceAssembliesSha256 = $referencePackageSha256
            dependencyInventorySha256 = $dependencyInventorySha256
            binaryBytes = $sizes[0]
            binarySha256 = $hashes[0]
            productVersion = $versionInfo.ProductVersion
            fileVersion = $versionInfo.FileVersion
            repeatability = "same-job byte equality across two isolated source trees and NuGet caches"
          }
          $provenancePath = Join-Path $artifactDirectory "provenance.json"
          [IO.File]::WriteAllText(
            $provenancePath,
            (($provenance | ConvertTo-Json -Depth 4) + "`n"),
            [Text.UTF8Encoding]::new($false)
          )
          "binary-sha256=$($hashes[0])" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "binary-bytes=$($sizes[0])" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Output "Rebuilt identical reviewed Squirrel updater bytes twice: SHA-256 $($hashes[0]), $($sizes[0]) bytes."

      - name: Upload reviewed updater and provenance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reviewed-squirrel-updater-${{ steps.build.outputs.binary-sha256 }}
          path: ${{ runner.temp }}/reviewed-squirrel-updater/
          if-no-files-found: error
          retention-days: 7
